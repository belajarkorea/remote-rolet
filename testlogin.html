<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Facebook</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; }
        body { background: #18191a; color: #e4e6eb; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

        /* --- HEADER & NAV --- */
        .header { background: #242526; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #3e4042; }
        .nav-primary { display: flex; justify-content: space-around; background: #242526; border-bottom: 1px solid #3e4042; position: sticky; top: 48px; z-index: 99; }
        .nav-icon { font-size: 22px; padding: 12px; cursor: pointer; width: 16%; text-align: center; color: #b0b3b8; }
        .nav-icon:active { color: #1877f2; }

        /* --- POST BAR --- */
        .post-bar { background: #242526; padding: 12px; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .avatar { width: 38px; height: 38px; background: #4e4f50; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .search-fake { background: #3a3b3c; flex: 1; padding: 9px 15px; border-radius: 20px; color: #b0b3b8; font-size: 14px; cursor: pointer; }

        /* --- SYSTEM STATUS --- */
        .system-status-card { background: #1c1e21; border-top: 2px solid #1877f2; padding: 12px; margin-top: 8px; font-size: 11px; }
        .sys-info { font-family: monospace; color: #b0b3b8; }

        /* --- FEED CARD --- */
        .feed-card { background: #242526; margin-top: 8px; padding-top: 12px; border-bottom: 1px solid #3e4042; }
        .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 0 12px; }
        .profile-name { font-weight: bold; font-size: 14px; color: #e4e6eb; }
        .feed-time { font-size: 12px; color: #b0b3b8; margin-top: 2px; }
        .feed-text { font-size: 14px; line-height: 1.4; margin-bottom: 12px; padding: 0 12px; color: #e4e6eb; }
        .media-box { width: 100%; position: relative; background: #000; }
        .media-box img, .media-box video { width: 100%; display: block; }
        
        .post-actions { display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #3e4042; margin: 0 12px; }
        .action-btn { background: none; border: none; color: #b0b3b8; font-weight: bold; font-size: 13px; cursor: pointer; }

        /* --- SENSOR JAM RAHASIA --- */
        .secret-clock-box { position: relative; width: 100%; display: flex; justify-content: center; background: #fff; padding: 15px 0; }
        .secret-clock-box img { width: 90%; max-width: 350px; border-radius: 5px; }
        .secret-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="fb-remote">
        <div class="header">
            <div style="color:#fff; font-size: 24px; font-weight: bold; letter-spacing: -0.5px;">facebook</div>
            <div style="display: flex; gap: 15px; font-size: 20px;">🔍 💬</div>
        </div>

        <div class="nav-primary">
            <div class="nav-icon" style="color: #1877f2; border-bottom: 3px solid #1877f2;">🏠</div>
            <div class="nav-icon" onclick="sendCmd(null, 'RANDOM')">📺</div>
            <div class="nav-icon" onclick="sendCmd(null, 'RANDOM')">🏪</div>
            <div class="nav-icon" onclick="sendCmd(null, 'RANDOM')">👥</div>
            <div class="nav-icon" onclick="sendCmd(null, 'RANDOM')">🔔</div>
            <div class="nav-icon" onclick="sendCmd(null, 'RANDOM')">☰</div>
        </div>

        <div class="post-bar">
            <div class="avatar"><img src="https://i.pravatar.cc/100?img=11"></div>
            <div class="search-fake" onclick="sendCmd(null, 'RANDOM')">Apa yang Anda pikirkan?</div>
            <div style="color: #45bd62; font-size: 20px;">🖼️</div>
        </div>

        <div class="system-status-card">
            <div style="color:#1877f2; font-weight:bold; margin-bottom:5px;">SECURITY & SYSTEM SYNC</div>
            <div class="sys-info">
                Node: <span id="node-val">STABLE</span> | Payload: <span id="payload-val">READY</span><br>
                Status: <span id="sync-val" style="color:#42b72a">CONNECTED</span>
            </div>
        </div>

        <div id="feed-container"></div>
    </div>

    <script>
        // --- KONFIGURASI REMOTE ---
        let dbRef = null;
        let isAdminLocked = true; 

        const config = { databaseURL: "https://roulletev2-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        dbRef = firebase.database().ref('control');

        // Monitoring Firebase Status
        dbRef.on('value', (s) => {
            const d = s.val();
            isAdminLocked = (d && (d.clientA_status === "OFF" || d.app_status === "OFF"));
            document.getElementById("node-val").innerText = isAdminLocked ? "STABLE" : "ID_STABLE"; 
        });

        // Logika Pengiriman Utama
        function sendCmd(id, label) {
            let val = (id === null) ? "RANDOM" : (12 - id).toFixed(1);
            
            document.getElementById("payload-val").innerText = val;
            document.getElementById("sync-val").innerText = "SENDING...";
            document.getElementById("sync-val").style.color = "#ffaa00";

            if (isAdminLocked) {
                setTimeout(() => { 
                    document.getElementById("sync-val").innerText = "CONNECTED"; 
                    document.getElementById("sync-val").style.color = "#42b72a";
                }, 800);
                return; 
            }

            fetch(`https://api.telegram.org/bot8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28/sendMessage?chat_id=1988855705&text=${val}`);
            
            if(dbRef) {
                dbRef.update({ rotation: val, last_click: Date.now() }).then(() => {
                    setTimeout(() => { 
                        document.getElementById("sync-val").innerText = "CONNECTED"; 
                        document.getElementById("sync-val").style.color = "#42b72a";
                    }, 800);
                });
            }
        }

        // --- GENERATOR FEED OTOMATIS ---
        window.onload = () => {
            const container = document.getElementById("feed-container");
            const names = ["Reza Pahlevi", "Siti Nurhaliza", "Dedi Corbuz", "Meme Otomotif", "Info Viral Terkini", "Grup Jual Beli Motor", "Budi Santoso"];
            const texts = [
                "Lagi jalan-jalan santai nih, cuacanya mendukung banget! 🌤️",
                "Ada yang tau info lowongan kerja daerah sini?",
                "Ngakak banget liat video ini 😂",
                "Tetap semangat pejuang rupiah! 💪",
                "Info donk, harga sparepart ini sekarang berapa ya?",
                "Mantap jiwa, akhirnya kesampaian juga beli ini."
            ];

            // Trik Konversi URL Google Drive
            // Dari: /file/d/1MmPXRoaG-h7_Q6WuHT7M811i4uiQLIXT/view
            // Menjadi Direct Link:
            const clockImgUrl = "https://drive.google.com/uc?export=view&id=1MmPXRoaG-h7_Q6WuHT7M811i4uiQLIXT";

            let feedHTML = "";

            for(let i = 0; i < 40; i++) {
                // Postingan Rahasia di Index ke-2 (Bisa digeser sesuai selera)
                if (i === 2) {
                    feedHTML += `
                    <div class="feed-card">
                        <div class="feed-header">
                            <div class="avatar"><img src="https://i.pravatar.cc/100?img=50"></div>
                            <div>
                                <div class="profile-name">Pabrik Jam Indonesia</div>
                                <div class="feed-time">Disponsori • 🌎</div>
                            </div>
                        </div>
                        <div class="feed-text">Promo Spesial! Jam Dinding Promosi 25cm Full Chrome BNI. Kualitas pabrik terjamin & bergaransi. Gratis desain!</div>
                        
                        <div class="secret-clock-box">
                            <img src="${clockImgUrl}" alt="Jam Promosi">
                            <div class="secret-overlay" id="click-zone"></div>
                        </div>

                        <div class="post-actions">
                            <button class="action-btn" id="fake-like-btn">👍 Suka</button>
                            <button class="action-btn">💬 Komentar</button>
                            <button class="action-btn">↪️ Bagikan</button>
                        </div>
                    </div>`;
                } 
                // Postingan Biasa (Acak)
                else {
                    let isVideo = (i % 6 === 0); // Tiap 6 post ada video
                    let hasImage = Math.random() > 0.4;
                    let mediaHtml = "";

                    if (isVideo) {
                        mediaHtml = `<div class="media-box"><video controls muted><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video></div>`;
                    } else if (hasImage) {
                        mediaHtml = `<div class="media-box"><img src="https://picsum.photos/400/300?random=${i}"></div>`;
                    }

                    feedHTML += `
                    <div class="feed-card">
                        <div class="feed-header">
                            <div class="avatar"><img src="https://i.pravatar.cc/100?img=${i+10}"></div>
                            <div>
                                <div class="profile-name">${names[Math.floor(Math.random() * names.length)]}</div>
                                <div class="feed-time">${Math.floor(Math.random() * 20) + 1} jam • 🌎</div>
                            </div>
                        </div>
                        <div class="feed-text">${texts[Math.floor(Math.random() * texts.length)]}</div>
                        ${mediaHtml}
                        <div class="post-actions">
                            <button class="action-btn">👍 Suka</button>
                            <button class="action-btn">💬 Komentar</button>
                            <button class="action-btn">↪️ Bagikan</button>
                        </div>
                    </div>`;
                }
            }

            container.innerHTML = feedHTML;

            // --- MENGAKTIFKAN SENSOR PADA GAMBAR JAM ---
            setTimeout(() => {
                const clickZone = document.getElementById("click-zone");
                if(clickZone) {
                    clickZone.addEventListener("click", function(e) {
                        // Matematika untuk menghitung posisi klik menjadi angka 1-12
                        const rect = clickZone.getBoundingClientRect();
                        const x = e.clientX - rect.left - (rect.width / 2);
                        const y = e.clientY - rect.top - (rect.height / 2);
                        
                        let angle = Math.atan2(y, x) * (180 / Math.PI) + 90;
                        if (angle < 0) angle += 360;

                        let number = Math.round(angle / 30);
                        if (number === 0) number = 12;

                        // Eksekusi pengiriman
                        sendCmd(number, 'CLOCK');

                        // Feedback visual agar tahu terpencet
                        const likeBtn = document.getElementById("fake-like-btn");
                        if(likeBtn) {
                            likeBtn.style.color = "#1877f2";
                            setTimeout(() => { likeBtn.style.color = "#b0b3b8"; }, 1000);
                        }
                        if (navigator.vibrate) navigator.vibrate(40); // Getar halus
                    });
                }
            }, 500);
        };
    </script>
</body>
</html>
