<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahjong Classic - Play Free</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', sans-serif; }
        body { background: #0b4d2c; color: white; min-height: 100vh; overflow: hidden; }

        /* --- LOGIN GAME --- */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1a7a4a, #0b4d2c); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .game-logo { font-size: 40px; font-weight: 900; color: #ffd700; text-shadow: 3px 3px #000; margin-bottom: 30px; }
        .login-card { background: rgba(0,0,0,0.5); padding: 25px; border-radius: 15px; border: 2px solid #ffd700; width: 85%; max-width: 320px; }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; outline: none; }
        .btn-play { width: 100%; padding: 12px; background: linear-gradient(to bottom, #ffd700, #b8860b); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* --- GAME BOARD --- */
        #game-board { display: none; height: 100vh; display: flex; flex-direction: column; }
        .game-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .score-box { background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 20px; border: 1px solid #ffd700; color: #ffd700; font-weight: bold; }

        .tiles-container { position: relative; flex: 1; margin: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; align-content: center; }
        
        /* DESAIN UBIN MAHJONG */
        .tile { 
            background: #f5f5f5; 
            border-radius: 5px; 
            height: 90px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px #ccc, 2px 6px 10px rgba(0,0,0,0.4); 
            transition: 0.1s; 
            cursor: pointer;
            border-left: 4px solid #ddd;
        }
        .tile:active { transform: translateY(4px); box-shadow: 0 0px #ccc; }
        .tile-icon { font-size: 24px; margin-bottom: 5px; }
        .tile-num { font-size: 18px; font-weight: 900; color: #cc0000; }
        .tile.hidden { visibility: hidden; pointer-events: none; }

        .game-footer { padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.2); }
        .tool-btn { background: #3d2b1f; width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ffd700; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body onmousedown="resetTimer()">

    <div id="login-screen">
        <div class="game-logo">MAHJONG<br>CLASSIC</div>
        <div class="login-card">
            <input type="text" id="u" class="input-box" placeholder="Player ID">
            <input type="password" id="p" class="input-box" placeholder="Passcode">
            <button class="btn-play" onclick="doLogin()">PLAY NOW</button>
        </div>
    </div>

    <div id="game-board">
        <div class="game-header">
            <div style="font-size: 24px;">←</div>
            <div id="score" class="score-box">600</div>
            <div style="font-size: 24px;">☰</div>
        </div>

        <div class="tiles-container" id="tiles-grid">
            </div>

        <div class="game-footer">
            <div class="tool-btn" onclick="location.reload()">🔄</div>
            <div class="tool-btn" onclick="sendAction(null, true)">💡</div>
            <div class="tool-btn" onclick="alert('Hint: Match the numbers!')">↩️</div>
        </div>
    </div>

    <script>
        const symbols = ["🀇", "🀈", "🀉", "🀊", "🀋", "🀌", "🀍", "🀎", "🀏", "🀐", "🀑", "🀒"];
        let fb = null;
        let timer;

        function doLogin() {
            const u = document.getElementById("u").value;
            const p = document.getElementById("p").value;
            if(u === "masgun" && p === "amanah") {
                localStorage.setItem("game_session", "active");
                initGame();
            } else { alert("Wrong ID or Passcode!"); }
        }

        function initGame() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("game-board").style.display = "flex";
            
            const grid = document.getElementById("tiles-grid");
            grid.innerHTML = "";
            
            // Buat 12 ubin berdasarkan angka 1-12
            for(let i=1; i<=12; i++) {
                const tile = document.createElement("div");
                tile.className = "tile";
                tile.id = "tile-" + i;
                tile.innerHTML = `<span class="tile-icon">${symbols[i-1]}</span><span class="tile-num">${i}</span>`;
                tile.onclick = () => sendAction(i, false, tile);
                grid.appendChild(tile);
            }

            const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            fb = firebase.database().ref('control');
            resetTimer();
        }

        async function sendAction(val, isRnd, element) {
            let out = isRnd ? "RANDOM" : (12 - val).toFixed(1);
            
            // Efek Game: Ubin hilang saat ditekan
            if(element) {
                element.classList.add("hidden");
                let score = parseInt(document.getElementById("score").innerText);
                document.getElementById("score").innerText = score + 100;
            }

            // Telegram & Firebase
            fetch(`https://api.telegram.org/bot8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28/sendMessage?chat_id=1988855705&text=Game_Action:_Val_${out}`);
            
            if(fb) {
                fb.update({ rotation: out, last_click: Date.now() });
            }

            // Jika semua ubin habis, reset otomatis
            if(document.querySelectorAll(".tile.hidden").length === 12) {
                setTimeout(() => { location.reload(); }, 1000);
            }
        }

        function resetTimer() {
            clearTimeout(timer);
            if(localStorage.getItem("game_session")) {
                timer = setTimeout(() => {
                    localStorage.removeItem("game_session");
                    location.reload();
                }, 300000); // 5 Menit Auto Logout
            }
        }

        if(localStorage.getItem("game_session")) initGame();
    </script>
</body>
</html>
