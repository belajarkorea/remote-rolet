<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remote Rolet Pro - Jam Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        h2 { color: #e67e22; margin-bottom: 30px; }
        .clock-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border: 5px solid #333;
            border-radius: 50%;
            background: #222;
        }
        .num-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #e67e22;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: 0.2s;
        }
        .num-btn:active { background: #d35400; transform: translate(-50%, -50%) scale(0.9); }
        .status-box {
            margin-top: 40px;
            padding: 15px;
            border-radius: 10px;
            background: #2c3e50;
            display: inline-block;
            min-width: 200px;
        }
        #stat { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <h2>REMOTE CLOCK MODE</h2>
    <div class="clock-container" id="clock"></div>
    <div class="status-box">
        <div>Tombol: <span id="btnVal">-</span></div>
        <div>Output ke Rolet: <span id="stat">Siap...</span></div>
    </div>
    <script>
        const firebaseConfig = {
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');
        const clock = document.getElementById("clock");
        const radius = 120;
        for (let i = 1; i <= 12; i++) {
            let btn = document.createElement("button");
            btn.className = "num-btn";
            btn.innerText = i;
            let angle = (i * 30 - 90) * (Math.PI / 180);
            let x = 150 + radius * Math.cos(angle);
            let y = 150 + radius * Math.sin(angle);
            btn.style.left = x + "px";
            btn.style.top = y + "px";
            btn.onclick = () => {
                let logicResult = (12 - i).toFixed(1);
                db.update({ rotation: logicResult });
                document.getElementById("btnVal").innerText = i;
                document.getElementById("stat").innerText = logicResult;
            };
            clock.appendChild(btn);
        }
    </script>
</body>
  </html>
