<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Rolet Pro - Jam Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        h2 { color: #e67e22; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Indikator Status */
        .status-header {
            padding: 10px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .online { background: #2e7d32; color: #fff; box-shadow: 0 0 10px rgba(46, 125, 50, 0.5); }
        .offline { background: #c62828; color: #fff; box-shadow: 0 0 10px rgba(198, 40, 40, 0.5); }

        .clock-container {
            position: relative; width: 300px; height: 300px; margin: 0 auto;
            border: 8px solid #333; border-radius: 50%; background: radial-gradient(#2c3e50, #000);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .num-btn {
            position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #d35400;
            background: #e67e22; color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; transform: translate(-50%, -50%); transition: 0.2s;
        }
        .num-btn:active { background: #fff; color: #e67e22; transform: translate(-50%, -50%) scale(1.2); }
        
        .rnd-btn {
            position: absolute; left: 150px; top: 150px; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid #27ae60;
            background: #2ecc71; color: white; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); z-index: 10;
        }
        .rnd-btn:active { background: #fff; color: #2ecc71; transform: translate(-50%, -50%) scale(0.9); }

        .status-box {
            margin-top: 30px; padding: 15px; border-radius: 12px;
            background: #2c3e50; display: inline-block; min-width: 250px; border: 1px solid #444;
        }
        #sync-text { display: block; font-size: 12px; color: #aaa; margin-top: 8px; }
        .success-sync { color: #2ecc71 !important; font-weight: bold; }
    </style>
</head>
<body>

    <div id="target-status" class="status-header offline">TARGET: OFFLINE</div>
    <h2>CLOCK REMOTE</h2>
    
    <div class="clock-container" id="clock">
        <button class="rnd-btn" onclick="sendRandom()">RND</button>
    </div>

    <div class="status-box">
        <div style="font-size: 18px;">Terakhir: <span id="btnVal" style="color:#e67e22">-</span></div>
        <div style="font-size: 14px; margin-top:5px;">Server Value: <span id="server-val" style="color:#2ecc71">...</span></div>
        <span id="sync-text">Firebase Sync: IDLE</span>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        const clock = document.getElementById("clock");
        const radius = 115;

        // 1. MONITOR KONEKSI TARGET (KEEP-ALIVE)
        db.child('keep_alive').on('value', (snapshot) => {
            const lastActive = snapshot.val();
            const now = Date.now();
            const statusHeader = document.getElementById("target-status");
            if (now - lastActive < 40000) {
                statusHeader.innerText = "TARGET: ONLINE (READY)";
                statusHeader.className = "status-header online";
            } else {
                statusHeader.innerText = "TARGET: OFFLINE (SLEEP)";
                statusHeader.className = "status-header offline";
            }
        });

        // 2. MONITOR PERUBAHAN DI SERVER (SYNC CONFIRMATION)
        db.child('rotation').on('value', (snapshot) => {
            const val = snapshot.val();
            document.getElementById("server-val").innerText = val;
            const syncText = document.getElementById("sync-text");
            syncText.innerText = "Firebase Sync: SUCCESS";
            syncText.className = "success-sync";
            setTimeout(() => { syncText.innerText = "Firebase Sync: IDLE"; syncText.className = ""; }, 2000);
        });

        // 3. GENERATE TOMBOL JAM MELINGKAR
        for (let i = 1; i <= 12; i++) {
            let btn = document.createElement("button");
            btn.className = "num-btn";
            btn.innerText = i;
            let angle = (i * 30 - 90) * (Math.PI / 180);
            let x = 150 + radius * Math.cos(angle);
            let y = 150 + radius * Math.sin(angle);
            btn.style.left = x + "px";
            btn.style.top = y + "px";

            btn.onclick = () => {
                firebase.database().goOnline(); // Auto-wake connection
                let logicResult = (12 - i).toFixed(1);
                db.update({ rotation: logicResult, last_click: Date.now() });
                document.getElementById("btnVal").innerText = i;
            };
            clock.appendChild(btn);
        }

        // 4. FUNGSI TOMBOL RANDOM
        function sendRandom() {
            firebase.database().goOnline();
            db.update({ rotation: "RANDOM", last_click: Date.now() });
            document.getElementById("btnVal").innerText = "RND";
        }
    </script>
</body>
</html>
