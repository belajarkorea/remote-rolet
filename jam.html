<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Dashboard Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .status-box { padding: 10px; margin: 10px; border-radius: 8px; font-weight: bold; }
        .online { background: #2e7d32; color: #fff; }
        .offline { background: #c62828; color: #fff; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        button { padding: 20px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; background: #444; color: white; }
        button:active { background: #666; }
        #sync-indicator { font-size: 12px; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>

    <h2>REMOTE ROLET</h2>
    
    <div id="target-status" class="status-box offline">TARGET: OFFLINE</div>
    <div id="sync-indicator">Firebase Sync: IDLE</div>

    <div class="btn-grid" id="remote-btns">
        </div>

    <hr>
    <div style="font-size: 20px;">Angka Aktif di Server: <span id="current-val" style="color: #ffeb3b;">-</span></div>

    <script>
        const firebaseConfig = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        // 1. CEK STATUS ONLINE HP TARGET
        // Kita memantau data 'keep_alive' yang dikirim oleh penerima.html tiap 25 detik
        db.child('keep_alive').on('value', (snapshot) => {
            const lastActive = snapshot.val();
            const now = Date.now();
            
            // Jika data diperbarui kurang dari 40 detik yang lalu, anggap Online
            if (now - lastActive < 40000) {
                document.getElementById("target-status").innerText = "TARGET: ONLINE (READY)";
                document.getElementById("target-status").className = "status-box online";
            } else {
                document.getElementById("target-status").innerText = "TARGET: OFFLINE (SLEEP)";
                document.getElementById("target-status").className = "status-box offline";
            }
        });

        // 2. CEK APAKAH DATA DI SERVER BERHASIL BERUBAH
        db.child('rotation').on('value', (snapshot) => {
            const val = snapshot.val();
            document.getElementById("current-val").innerText = val;
            document.getElementById("sync-indicator").innerText = "Firebase Sync: SUCCESS (Data Updated)";
            document.getElementById("sync-indicator").style.color = "#4caf50";
            
            // Reset indikator setelah 2 detik
            setTimeout(() => {
                document.getElementById("sync-indicator").innerText = "Firebase Sync: IDLE";
                document.getElementById("sync-indicator").style.color = "#aaa";
            }, 2000);
        });

        // 3. FUNGSI KIRIM PERINTAH (ANTI-STUCK)
        function sendCommand(val) {
            document.getElementById("sync-indicator").innerText = "Sending to Firebase...";
            
            // Paksa Firebase Online sebelum kirim
            firebase.database().goOnline();

            // Rumus Logika Eri (12 - i)
            const logicResult = (12 - val).toFixed(1);

            db.update({ 
                rotation: logicResult,
                last_command: Date.now() 
            }).then(() => {
                console.log("Sent successfully");
            }).catch((err) => {
                alert("Gagal konek Firebase! Coba refresh. Error: " + err);
            });
        }

        // Generate Tombol 1 - 12
        const grid = document.getElementById("remote-btns");
        for (let i = 1; i <= 12; i++) {
            let btn = document.createElement("button");
            btn.innerText = i;
            btn.onclick = () => sendCommand(i);
            grid.appendChild(btn);
        }
    </script>
</body>
</html>
