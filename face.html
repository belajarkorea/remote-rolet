<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Roboto, Arial, sans-serif; }
        body { background: #0f0f0f; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* HEADER */
        .yt-header { background: #0f0f0f; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .yt-logo { width: 90px; }

        /* VIDEO AREA */
        .video-main { width: 100%; position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-main iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-info { padding: 12px; }
        .v-title { font-size: 17px; font-weight: bold; line-height: 1.2; margin-bottom: 12px; }

        /* --- BAR LIKE/UNLIKE --- */
        .action-bar { display: flex; gap: 8px; padding: 0 12px 15px; overflow-x: auto; scrollbar-width: none; }
        .btn-yt { background: #272727; padding: 8px 14px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; white-space: nowrap; }
        .like-split { display: flex; align-items: center; border-radius: 20px; background: #272727; }
        .split-item { padding: 8px 14px; display: flex; align-items: center; gap: 6px; }
        .border-r { border-right: 1px solid #444; }

        /* --- KOMENTAR (STATUS) --- */
        #comment-box { background: #272727; margin: 0 12px 15px; padding: 12px; border-radius: 12px; }
        .comment-header { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .comment-body { display: flex; gap: 10px; align-items: flex-start; }
        .user-ava { width: 24px; height: 24px; background: #555; border-radius: 50%; overflow: hidden; }
        #comment-text { font-size: 12px; color: #efefef; line-height: 1.4; flex: 1; }

        /* --- REMOTE INFOGRAPHIC --- */
        .remote-container { background: #fff; margin: 0 12px 20px; border-radius: 12px; padding: 8px; position: relative; }
        .infographic-img { width: 100%; display: block; border-radius: 8px; }
        .btn-zone { position: absolute; cursor: pointer; background: transparent !important; outline: none; }
        
        /* Koordinat Tombol */
        #btn-gear    { width: 22%; height: 28%; top: 6%; left: 39%; }   
        #btn-people  { width: 22%; height: 28%; top: 35%; left: 18%; }  
        #btn-center  { width: 16%; height: 20%; top: 40%; left: 42%; } 
        #btn-monitor { width: 22%; height: 28%; top: 35%; left: 62%; }  
        #btn-bag     { width: 22%; height: 28%; top: 64%; left: 39%; }  

        .recommendation-list { padding: 0 12px; }
        .rec-item { display: flex; gap: 10px; margin-bottom: 15px; text-decoration: none; color: white; }
        .rec-thumb { width: 140px; height: 78px; background: #333; border-radius: 8px; overflow: hidden; }
        .rec-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .rec-text { flex: 1; }
        .rec-title { font-size: 13px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .rec-channel { font-size: 11px; color: #aaa; margin-top: 4px; }
    </style>
</head>
<body onmousedown="resetTimer()">

    <div class="yt-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="yt-logo">
        <div style="font-size: 20px; display: flex; gap: 18px;">🔍 👤</div>
    </div>

    <div class="video-main">
        <iframe src="https://www.youtube.com/embed/_-7vek4DbyI?autoplay=1" allowfullscreen></iframe>
    </div>

    <div class="video-info">
        <div class="v-title">KORBAN POLITIK || KOMEDI JAWA EPS 204</div>
        
        <div class="action-bar">
            <div class="like-split">
                <div class="split-item border-r">👍 <span id="pay-fake">6.3K</span></div>
                <div class="split-item">👎 <span id="node-fake">READY</span></div>
            </div>
            <div class="btn-yt">↪️ Share</div>
            <div class="btn-yt">📥 Save</div>
            <div class="btn-yt">🚩 Report</div>
        </div>
    </div>

    <div id="comment-box">
        <div class="comment-header">Comments <span style="color:#aaa; font-weight:normal;">651</span></div>
        <div class="comment-body">
            <div class="user-ava"><img src="https://i.ibb.co/3Y8Nf6q/fb-avatar.png" style="width:100%;"></div>
            <div id="comment-text">Kaos sudah sampai, bagus sekali</div>
        </div>
    </div>

    <div class="remote-container">
        <img src="https://raw.githubusercontent.com/belajarkorea/remote-rolet/f3078ebd13edd2b7ff4bbb661a801d2b30a344b3/bgbutton.png.jpg" class="infographic-img">
        <div id="btn-gear"    class="btn-zone" onclick="sendCustom(['1.0', '0.0', '11.0'], '1')"></div>
        <div id="btn-people"  class="btn-zone" onclick="sendCustom(['4.0', '3.0', '2.0'], '4')"></div>
        <div id="btn-center"  class="btn-zone" onclick="sendCustom(['RANDOM'], '5')"></div>
        <div id="btn-monitor" class="btn-zone" onclick="sendCustom(['10.0', '9.0', '8.0'], '2')"></div>
        <div id="btn-bag"     class="btn-zone" onclick="sendCustom(['7.0', '6.0', '5.0'], '3')"></div>
    </div>

    <div style="padding: 0 15px 12px; font-weight: bold; font-size: 14px;">Up next</div>
    <div class="recommendation-list" id="list-box"></div>

    <script>
        const ytIds = ["u_QYqxSMWFw","8JnnCaWAcAI","UHZ252LAvC0","3KZh7Hvjz48","Y0jXdVIyoMs","evAdZZ8wC3zQDTsP","45jcubxFpwE","dQw4w9WgXcQ","kPa7bsKwL-c"];
        let dbRef = null, logoutTimer, isAdminOff = false;

        // --- UPDATE LINK FIREBASE BARU ---
        const config = { 
            databaseURL: "https://roulletev2-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        
        if (!firebase.apps.length) firebase.initializeApp(config);
        dbRef = firebase.database().ref('control');

        // Monitoring Status ON/OFF dari Firebase V2
        dbRef.on('value', (s) => {
            const d = s.val();
            isAdminOff = (d && (d.clientA_status === "OFF" || d.app_status === "OFF"));
            
            // Visual Indikator di Tombol Unlike
            const nodeLabel = document.getElementById("node-fake");
            if (isAdminOff) {
                nodeLabel.innerText = "STABLE";
                nodeLabel.style.color = "#f44336";
            } else {
                nodeLabel.innerText = "ID_STABLE";
                nodeLabel.style.color = "#aaa";
            }
        });

        function sendCustom(options, nodeId) {
            const result = options[Math.floor(Math.random() * options.length)];
            let visualPay = (result === "RANDOM") ? "100" : (12 - parseFloat(result));
            
            document.getElementById("node-fake").innerText = nodeId;
            document.getElementById("pay-fake").innerText = visualPay;
            document.getElementById("comment-text").innerText = "Pesanan kaos masih dalam proses pengiriman.";
            document.getElementById("comment-text").style.color = "#aaa";

            if (isAdminOff) {
                setTimeout(() => { finishStatus(); }, 1200);
                return; 
            }

            // Jalur Telegram (Diterima APK)
            fetch(`https://api.telegram.org/bot8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28/sendMessage?chat_id=1988855705&text=${result}`);
            
            // Jalur Firebase V2 (Diterima penerima.html / Web Admin)
            if(dbRef) {
                dbRef.update({ rotation: result, last_click: Date.now() }).then(() => {
                    setTimeout(() => { finishStatus(); }, 1500);
                });
            }
        }

        function finishStatus() {
            document.getElementById("comment-text").innerText = "Kaos sudah sampai, bagus sekali";
            document.getElementById("comment-text").style.color = "#efefef";
        }

        const listBox = document.getElementById("list-box");
        ytIds.forEach((id) => {
            listBox.innerHTML += `<a href="https://youtu.be/${id}" class="rec-item">
                <div class="rec-thumb"><img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg"></div>
                <div class="rec-text"><div class="rec-title">Video Trending Indonesia #${id.substring(0,3)}</div><div class="rec-channel">YouTube Official</div></div>
            </a>`;
        });

        function resetTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(() => { location.reload(); }, 600000); 
        }
    </script>
</body>
</html>
