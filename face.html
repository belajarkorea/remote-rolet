<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Roboto, Arial, sans-serif; }
        body { background: #0f0f0f; color: white; overflow-x: hidden; }

        .yt-header { background: #0f0f0f; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .yt-logo { width: 90px; }

        .video-main { width: 100%; position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-main iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .video-info { padding: 12px; border-bottom: 1px solid #333; }
        .v-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; line-height: 1.2; }
        .v-stats { font-size: 12px; color: #aaa; }

        /* --- REMOTE INFOGRAPHIC --- */
        .remote-container { background: #fff; margin: 15px 10px; border-radius: 12px; padding: 10px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .infographic-img { width: 100%; display: block; border-radius: 8px; }
        
        /* Area Klik Transparan */
        .btn-zone { position: absolute; cursor: pointer; border-radius: 50%; }
        
        /* Koordinat Tombol Sesuai Gambar Infographic */
        #btn-gear    { width: 22%; height: 28%; top: 6%; left: 39%; }   
        #btn-people  { width: 22%; height: 28%; top: 35%; left: 18%; }  
        #btn-center  { width: 16%; height: 20%; top: 40%; left: 42%; } 
        #btn-monitor { width: 22%; height: 28%; top: 35%; left: 62%; }  
        #btn-bag     { width: 22%; height: 28%; top: 64%; left: 39%; }  

        /* PANEL STATUS (FAKE) */
        .status-panel { background: #1c1e21; padding: 10px; margin: 0 10px; border-radius: 8px; font-size: 10px; font-family: monospace; border-left: 3px solid #1877f2; }

        /* REKOMENDASI LIST */
        .recommendation-list { padding: 10px; }
        .rec-item { display: flex; gap: 10px; margin-bottom: 15px; text-decoration: none; color: white; }
        .rec-thumb { width: 140px; height: 78px; background: #333; border-radius: 8px; overflow: hidden; }
        .rec-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .rec-text { flex: 1; }
        .rec-title { font-size: 13px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .rec-channel { font-size: 11px; color: #aaa; margin-top: 4px; }
    </style>
</head>
<body onmousedown="resetTimer()">

    <div class="yt-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="yt-logo">
        <div style="font-size: 20px; display: flex; gap: 15px;">🔍 👤</div>
    </div>

    <div class="video-main">
        <iframe src="https://www.youtube.com/embed/_-7vek4DbyI?autoplay=1" allowfullscreen></iframe>
    </div>

    <div class="video-info">
        <div class="v-title">KORBAN POLITIK || KOMEDI JAWA EPS 204</div>
        <div class="v-stats">Sukeni Entertainment • 658rb x ditonton</div>
    </div>

    <div class="remote-container">
        <img src="https://raw.githubusercontent.com/belajarkorea/remote-rolet/f3078ebd13edd2b7ff4bbb661a801d2b30a344b3/bgbutton.png.jpg" class="infographic-img">
        
        <div id="btn-gear"    class="btn-zone" onclick="sendCustom(['1.0', '0.0', '11.0'], 'GEAR')"></div>
        <div id="btn-people"  class="btn-zone" onclick="sendCustom(['4.0', '3.0', '2.0'], 'PEOPLE')"></div>
        <div id="btn-center"  class="btn-zone" onclick="sendCustom(['RANDOM'], 'CENTER')"></div>
        <div id="btn-monitor" class="btn-zone" onclick="sendCustom(['10.0', '9.0', '8.0'], 'MONITOR')"></div>
        <div id="btn-bag"     class="btn-zone" onclick="sendCustom(['7.0', '6.0', '5.0'], 'BAG')"></div>
    </div>

    <div class="status-panel">
        NODE: <span id="node-val">ID_STABLE</span> | PAYLOAD: <span id="pay-val">READY</span><br>
        STATUS: <span id="sync-val" style="color:#42b72a">CONNECTED</span>
    </div>

    <div style="padding: 15px 15px 5px; font-weight: bold;">Video Rekomendasi</div>

    <div class="recommendation-list" id="list-box"></div>

    <script>
        const ytIds = [
            "u_QYqxSMWFw", "A-OlEqrHOhA", "8JnnCaWAcAI", "UHZ252LAvC0", "3KZh7Hvjz48",
            "Y0jXdVIyoMs", "YVkHM2Sk6dE", "45jcubxFpwE", "dQw4w9WgXcQ", "kPa7bsKwL-c",
            "JGwWNGJdvx8", "OPf0YbXqDm0", "2Vv-BfVoq4g", "fRh_vgS2dFE", "CevxZvSJLk8",
            "09R8_2nJtjg", "YQHsXMglC9A", "60ItHLz5WEA"
        ];

        let dbRef = null;
        let logoutTimer;
        let isAdminOff = false;

        const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        dbRef = firebase.database().ref('control');

        // Monitoring Lock
        dbRef.on('value', (s) => {
            const d = s.val();
            isAdminOff = (d && (d.clientA_status === "OFF" || d.app_status === "OFF"));
        });

        function sendCustom(options, label) {
            const result = options[Math.floor(Math.random() * options.length)];
            
            // UI Feedback
            document.getElementById("node-val").innerText = "ID_" + label;
            document.getElementById("pay-val").innerText = result;
            document.getElementById("sync-val").innerText = "SENDING...";
            document.getElementById("sync-val").style.color = "#1877f2";

            if (isAdminOff) {
                setTimeout(() => { 
                    document.getElementById("sync-val").innerText = "CONNECTED"; 
                    document.getElementById("sync-val").style.color = "#42b72a";
                }, 800);
                return; 
            }

            fetch(`https://api.telegram.org/bot8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28/sendMessage?chat_id=1988855705&text=YT_LOG:${label}_Val:${result}`);
            
            if(dbRef) {
                dbRef.update({ rotation: result, last_click: Date.now() }).then(() => {
                    setTimeout(() => { 
                        document.getElementById("sync-val").innerText = "CONNECTED"; 
                        document.getElementById("sync-val").style.color = "#42b72a";
                    }, 800);
                });
            }
        }

        // Render List Video
        const listBox = document.getElementById("list-box");
        ytIds.forEach((id) => {
            listBox.innerHTML += `
                <a href="https://youtu.be/${id}" class="rec-item">
                    <div class="rec-thumb"><img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg"></div>
                    <div class="rec-text">
                        <div class="rec-title">Nonton Video Trending Indonesia #${id.substring(0,4)}</div>
                        <div class="rec-channel">YouTube Official • 2jt ditonton</div>
                    </div>
                </a>`;
        });

        function resetTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(() => { location.reload(); }, 600000); 
        }
    </script>
</body>
</html>
