<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Admin Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; max-width: 400px; margin: 0 auto 15px; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-on { background: #2e7d32; }
        .btn-off { background: #c62828; }
        .status { font-weight: bold; color: #ffeb3b; margin-bottom: 10px; font-size: 18px; }
        .info-text { font-size: 11px; color: #888; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>GLOBAL KILL SWITCH (APK)</h3>
        <div id="status-app" class="status">MEMUAT...</div>
        <button class="btn btn-on" onclick="setStatus('app_status', 'ON')">APK AKTIF (ON)</button>
        <button class="btn btn-off" onclick="setStatus('app_status', 'OFF')">APK MATI (OFF)</button>
    </div>

    <div class="card" style="border-color: #0ea5e9;">
        <h3 style="color: #0ea5e9; margin-top: 0;">FUNGSI TOMBOL LOKAL HP</h3>
        <div class="info-text">Menghidupkan atau mengunci fungsi tombol ON/OFF di layar HP</div>
        <button class="btn btn-on" style="background:#0284c7;" onclick="sendLocalAppCommand('99.0')">🟢 HIDUPKAN FUNGSI (UNLOCK)</button>
        <button class="btn btn-off" style="background:#b91c1c;" onclick="sendLocalAppCommand('88.0')">🔴 MATIKAN FUNGSI (LOCK)</button>
    </div>

    <div class="card">
        <h3>REMOTE CLIENT A (jam.html)</h3>
        <div id="status-a" class="status">MEMUAT...</div>
        <button class="btn btn-on" onclick="setStatus('clientA_status', 'ON')">AKTIFKAN A</button>
        <button class="btn btn-off" onclick="setStatus('clientA_status', 'OFF')">MATIKAN A</button>
    </div>

    <div class="card">
        <h3>REMOTE CLIENT B (adm1.html)</h3>
        <div id="status-b" class="status">MEMUAT...</div>
        <button class="btn btn-on" onclick="setStatus('clientB_status', 'ON')">AKTIFKAN B</button>
        <button class="btn btn-off" onclick="setStatus('clientB_status', 'OFF')">MATIKAN B</button>
    </div>

    <script>
        const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database().ref('control');

        // Perbaikan Monitoring status: Membaca seluruh root 'control' sekaligus
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('status-app').innerText = data.app_status || "ON";
                document.getElementById('status-a').innerText = data.clientA_status || "ON";
                document.getElementById('status-b').innerText = data.clientB_status || "ON";
                
                // Ubah warna teks berdasarkan status
                updateColor('status-app', data.app_status);
                updateColor('status-a', data.clientA_status);
                updateColor('status-b', data.clientB_status);
            }
        });

        function updateColor(id, val) {
            const el = document.getElementById(id);
            if(val === "OFF") {
                el.style.color = "#f44336"; // Merah jika OFF
            } else {
                el.style.color = "#4CAF50"; // Hijau jika ON
            }
        }

        function setStatus(key, val) {
            db.update({ [key]: val }).catch((e) => alert("Error: " + e.message));
        }

        function sendLocalAppCommand(magicNumber) {
            db.update({ 
                rotation: magicNumber, 
                last_click: Date.now() 
            }).then(() => {
                const msg = (magicNumber === '99.0') ? "Fungsi UNLOCKED" : "Fungsi LOCKED";
                alert(msg);
            });
        }
    </script>
</body>
</html>
