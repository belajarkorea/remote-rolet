<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBL Control - Simple Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; max-width: 400px; margin: 0 auto 15px; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-on { background: #2e7d32; }
        .btn-off { background: #c62828; }
        .status { font-weight: bold; color: #ffeb3b; margin-bottom: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>GLOBAL KILL SWITCH</h3>
        <div id="status-app" class="status">CHECKING...</div>
        <button class="btn btn-on" onclick="setDbStatus('app_status', 'ON')">AKTIFKAN APK</button>
        <button class="btn btn-off" onclick="setStatusAppOff()">MATIKAN APK (CLOSE)</button>
    </div>

    <div class="card" style="border-color: #0ea5e9;">
        <h3 style="color: #0ea5e9;">KONTROL TOMBOL RAHASIA</h3>
        <div id="status-buttons" class="status">CHECKING...</div>
        <button class="btn btn-on" style="background:#0284c7;" onclick="setDbStatus('secret_buttons', 'ON')">TAMPILKAN TOMBOL</button>
        <button class="btn btn-off" style="background:#b91c1c;" onclick="setDbStatus('secret_buttons', 'OFF')">SEMBUNYIKAN TOMBOL</button>
    </div>

    <script>
        const config = { databaseURL: "https://roullete-gbl-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.database().ref('control');

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            
            document.getElementById('status-app').innerText = data.app_status;
            document.getElementById('status-app').style.color = (data.app_status === "OFF") ? "#f44336" : "#4CAF50";
            
            document.getElementById('status-buttons').innerText = (data.secret_buttons === "ON") ? "VISIBLE" : "HIDDEN";
            document.getElementById('status-buttons').style.color = (data.secret_buttons === "ON") ? "#4CAF50" : "#f44336";
        });

        function setDbStatus(key, val) {
            db.update({ [key]: val });
        }

        function setStatusAppOff() {
            if(confirm("Apakah Anda yakin ingin menutup paksa aplikasi klien?")) {
                setDbStatus('app_status', 'OFF');
            }
        }
    </script>
</body>
</html>
