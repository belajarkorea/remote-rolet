<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2c3e50; padding: 20px; border-radius: 15px; border: 1px solid #444; max-width: 400px; margin: 0 auto; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .btn-on { background: #2e7d32; }
        .btn-off { background: #c62828; }
        .status-text { margin-top: 10px; font-weight: bold; color: #ffeb3b; }
        h3 { margin-bottom: 10px; color: #ddd; font-size: 16px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>APLIKASI STATUS</h3>
        <div id="app-status-now" class="status-text">MEMUAT...</div>
        <button class="btn btn-on" onclick="setAppStatus('ON')">AKTIFKAN APK (ON)</button>
        <button class="btn btn-off" onclick="setAppStatus('OFF')">MATIKAN APK (OFF)</button>
    </div>

    <div class="card">
        <h3>REMOTE (JAM.HTML) STATUS</h3>
        <div id="remote-status-now" class="status-text">MEMUAT...</div>
        <button class="btn btn-on" onclick="setRemoteStatus('ON')">AKTIFKAN FUNGSI REMOTE</button>
        <button class="btn btn-off" onclick="setRemoteStatus('OFF')">NONAKTIFKAN FUNGSI REMOTE</button>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        // Listener Status Aplikasi
        db.child('app_status').on('value', (snap) => {
            document.getElementById("app-status-now").innerText = "STATUS APK: " + (snap.val() || "ON");
        });

        // Listener Status Remote
        db.child('remote_status').on('value', (snap) => {
            document.getElementById("remote-status-now").innerText = "STATUS REMOTE: " + (snap.val() || "ON");
        });

        // Fungsi Update Aplikasi
        function setAppStatus(status) {
            db.update({ app_status: status }).then(() => {
                alert("Aplikasi status set to: " + status);
            });
        }

        // Fungsi Update Remote
        function setRemoteStatus(status) {
            db.update({ remote_status: status }).then(() => {
                alert("Remote status set to: " + status);
            });
        }
    </script>
</body>
</html>
