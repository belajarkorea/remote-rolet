<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Rolet Pro - Dual Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #activation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #2c3e50; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; }
        .login-box input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; border: none; text-align: center; font-size: 18px; }
        .login-box button { width: 100%; padding: 12px; background: #e67e22; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        .conn-header { display: flex; justify-content: space-around; margin-bottom: 15px; gap: 10px; }
        .indicator { flex: 1; padding: 8px; border-radius: 5px; font-size: 11px; font-weight: bold; background: #333; }
        .on { background: #2e7d32; color: #fff; }
        .off { background: #c62828; color: #fff; }

        h2 { color: #e67e22; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 18px; }
        .clock-container { position: relative; width: 300px; height: 300px; margin: 0 auto; border: 8px solid #333; border-radius: 50%; background: radial-gradient(#2c3e50, #000); }
        .num-btn { position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #d35400; background: #e67e22; color: white; font-weight: bold; transform: translate(-50%, -50%); cursor: pointer; transition: 0.1s; }
        .num-btn:active { background: white; color: #e67e22; }
        .rnd-btn { position: absolute; left: 150px; top: 150px; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; border: 4px solid #27ae60; background: #2ecc71; color: white; font-weight: bold; z-index: 10; cursor: pointer; }
        
        .status-box { margin-top: 25px; padding: 15px; border-radius: 12px; background: #2c3e50; display: inline-block; min-width: 260px; border: 1px solid #444; text-align: left; }
        .stat-line { font-size: 13px; margin: 5px 0; display: flex; justify-content: space-between; }
        .val-text { font-weight: bold; color: #e67e22; }
        #sync-status { font-size: 12px; color: #ffeb3b; font-weight: bold; display: block; margin-top: 10px; text-align: center; }
        .success-text { color: #2ecc71 !important; }
    </style>
</head>
<body>

    <div id="activation-overlay">
        <div class="login-box">
            <h3>KODE AKTIVASI</h3>
            <input type="password" id="input-kode" placeholder="••••">
            <button onclick="cekAktivasi()">MASUK</button>
        </div>
    </div>

    <div id="remote-content" style="display:none;">
        <div class="conn-header">
            <div id="status-fb" class="indicator off">FIREBASE: DISCONNECTED</div>
            <div id="status-tg" class="indicator off">TELEGRAM: READY</div>
        </div>

        <h2>CLOCK REMOTE PRO</h2>
        
        <div class="clock-container" id="clock">
            <button class="rnd-btn" onclick="sendRandom()">RND</button>
        </div>

        <div class="status-box">
            <div class="stat-line">Terakhir Di-klik: <span id="btnVal" class="val-text">-</span></div>
            <div class="stat-line">Server Value: <span id="server-val" class="val-text" style="color:#2ecc71">...</span></div>
            <hr style="border: 0; border-top: 1px solid #444;">
            <div class="stat-line">Firebase Sync: <span id="fb-sync" style="color:#aaa">IDLE</span></div>
            <div class="stat-line">Telegram Sync: <span id="tg-sync" style="color:#aaa">IDLE</span></div>
            <span id="sync-status">STATUS: STANDBY</span>
        </div>
    </div>

    <script>
        const KODE_AKTIVASI = "1234";
        const TG_TOKEN = "8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28"; 
        const TG_CHATID = "1988855705";

        let firebaseDb = null;

        function cekAktivasi() {
            if (document.getElementById("input-kode").value === KODE_AKTIVASI) {
                document.getElementById("activation-overlay").style.display = "none";
                document.getElementById("remote-content").style.display = "block";
                initFirebase();
                document.getElementById("status-tg").className = "indicator on";
            }
        }

        async function sendToTelegram(result) {
            const tgSync = document.getElementById("tg-sync");
            try {
                const tgUrl = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHATID}&text=${result}`;
                await fetch(tgUrl);
                tgSync.innerText = "SUCCESS";
                tgSync.className = "success-text";
            } catch (e) {
                tgSync.innerText = "FAILED";
                tgSync.style.color = "#c62828";
            }
        }

        async function sendCommand(val, isRandom = false) {
            // Perbaikan NaN: Pastikan logicResult adalah angka valid
            let logicResult;
            if (isRandom) {
                logicResult = (Math.floor(Math.random() * 12)).toFixed(1);
                document.getElementById("btnVal").innerText = "RANDOM";
            } else {
                logicResult = (12 - val).toFixed(1);
                document.getElementById("btnVal").innerText = val;
            }

            document.getElementById("sync-status").innerText = "STATUS: SENDING...";
            document.getElementById("fb-sync").innerText = "PENDING...";
            document.getElementById("tg-sync").innerText = "PENDING...";

            // 1. KIRIM KE TELEGRAM
            sendToTelegram(logicResult);

            // 2. KIRIM KE FIREBASE
            if (firebaseDb) {
                firebase.database().goOnline();
                firebaseDb.update({ rotation: logicResult, last_click: Date.now() }).then(() => {
                    const fbSync = document.getElementById("fb-sync");
                    fbSync.innerText = "SUCCESS";
                    fbSync.className = "success-text";
                });
            }

            setTimeout(() => {
                const status = document.getElementById("sync-status");
                status.innerText = "STATUS: BERHASIL TERKIRIM!";
                status.className = "success-text";
                setTimeout(() => { 
                    status.innerText = "STATUS: STANDBY"; 
                    status.className = ""; 
                    document.getElementById("fb-sync").className = "";
                    document.getElementById("tg-sync").className = "";
                    document.getElementById("fb-sync").innerText = "IDLE";
                    document.getElementById("tg-sync").innerText = "IDLE";
                }, 2000);
            }, 500);
        }

        function initFirebase() {
            const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
            firebase.initializeApp(config);
            firebaseDb = firebase.database().ref('control');
            
            // Monitor Online & Server Value
            firebaseDb.on('value', (snap) => {
                const data = snap.val();
                if (data && data.rotation) {
                    document.getElementById("server-val").innerText = data.rotation;
                }
            });

            firebase.database().ref(".info/connected").on("value", (snap) => {
                const fbHeader = document.getElementById("status-fb");
                if (snap.val() === true) {
                    fbHeader.innerText = "FIREBASE: CONNECTED";
                    fbHeader.className = "indicator on";
                } else {
                    fbHeader.innerText = "FIREBASE: RECONNECTING...";
                    fbHeader.className = "indicator off";
                }
            });

            const clock = document.getElementById("clock");
            for (let i = 1; i <= 12; i++) {
                let btn = document.createElement("button");
                btn.className = "num-btn";
                btn.innerText = i;
                let angle = (i * 30 - 90) * (Math.PI / 180);
                btn.style.left = (150 + 115 * Math.cos(angle)) + "px";
                btn.style.top = (150 + 115 * Math.sin(angle)) + "px";
                btn.onclick = () => sendCommand(i);
                clock.appendChild(btn);
            }
        }

        function sendRandom() {
            sendCommand(null, true);
        }
    </script>
</body>
</html>
