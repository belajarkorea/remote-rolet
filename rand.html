<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remote Rolet Pro - Jam Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        h2 { color: #e67e22; margin-bottom: 30px; }
        .clock-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border: 5px solid #333;
            border-radius: 50%;
            background: #222;
        }
        .num-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #e67e22;
            color: white;
            font-weight: bold; font-size: 18px;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: 0.2s;
        }
        .num-btn:active { background: #d35400; transform: translate(-50%, -50%) scale(0.9); }
        
        /* Tombol Random di Tengah */
        .rnd-btn {
            position: absolute;
            left: 150px; top: 150px;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            border-radius: 50%;
            border: none;
            background: #2ecc71;
            color: white;
            font-weight: bold; font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }
        .rnd-btn:active { background: #27ae60; transform: translate(-50%, -50%) scale(0.9); }

        .status-box {
            margin-top: 40px;
            padding: 15px;
            border-radius: 10px;
            background: #2c3e50;
            display: inline-block;
            min-width: 200px;
        }
        #stat { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <h2>REMOTE CLOCK MODE</h2>
    
    <div class="clock-container" id="clock">
        <button class="rnd-btn" onclick="sendRandom()">RND</button>
    </div>

    <div class="status-box">
        <div>Terakhir: <span id="btnVal">-</span></div>
        <div>Status: <span id="stat">Standby</span></div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        const clock = document.getElementById("clock");
        const radius = 120;

        // Generate tombol jam melingkar
        for (let i = 1; i <= 12; i++) {
            let btn = document.createElement("button");
            btn.className = "num-btn";
            btn.innerText = i;
            let angle = (i * 30 - 90) * (Math.PI / 180);
            let x = 150 + radius * Math.cos(angle);
            let y = 150 + radius * Math.sin(angle);
            btn.style.left = x + "px";
            btn.style.top = y + "px";

            btn.onclick = () => {
                let logicResult = (12 - i).toFixed(1);
                db.update({ rotation: logicResult });
                document.getElementById("btnVal").innerText = i;
                document.getElementById("stat").innerText = "Sent: " + logicResult;
            };
            clock.appendChild(btn);
        }

        // Fungsi untuk tombol Random
        function sendRandom() {
            db.update({ rotation: "RANDOM" });
            document.getElementById("btnVal").innerText = "RND";
            document.getElementById("stat").innerText = "Mode Acak Aktif";
        }
    </script>
</body>
</html>
