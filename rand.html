<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Rolet Pro - Auto Scan Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #activation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #2c3e50; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; }
        .login-box input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; border: none; text-align: center; font-size: 18px; }
        .login-box button { width: 100%; padding: 12px; background: #e67e22; border: none; color: white; font-weight: bold; border-radius: 5px; }
        h2 { color: #e67e22; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .status-header { padding: 10px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .online { background: #2e7d32; color: #fff; }
        .offline { background: #c62828; color: #fff; }
        .clock-container { position: relative; width: 300px; height: 300px; margin: 0 auto; border: 8px solid #333; border-radius: 50%; background: radial-gradient(#2c3e50, #000); }
        .num-btn { position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #d35400; background: #e67e22; color: white; font-weight: bold; transform: translate(-50%, -50%); cursor: pointer; }
        .rnd-btn { position: absolute; left: 150px; top: 150px; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; border: 4px solid #27ae60; background: #2ecc71; color: white; font-weight: bold; z-index: 10; cursor: pointer; }
        .status-box { margin-top: 30px; padding: 15px; border-radius: 12px; background: #2c3e50; display: inline-block; min-width: 250px; border: 1px solid #444; }
        #scan-info { font-size: 11px; color: #ffeb3b; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="activation-overlay">
        <div class="login-box">
            <h3>KODE AKTIVASI</h3>
            <input type="password" id="input-kode" placeholder="••••">
            <button onclick="cekAktivasi()">MASUK</button>
        </div>
    </div>

    <div id="remote-content" style="display:none;">
        <div id="target-status" class="status-header offline">SCANNING TARGET...</div>
        <h2>CLOCK REMOTE</h2>
        <div class="clock-container" id="clock"><button class="rnd-btn" onclick="sendRandom()">RND</button></div>
        <div class="status-box">
            <div>Terakhir: <span id="btnVal" style="color:#e67e22">-</span></div>
            <span id="scan-info">Mencari IP Target di Jaringan...</span>
        </div>
    </div>

    <script>
        const KODE_AKTIVASI = "1234";
        let ipTarget = null;
        let firebaseDb = null;

        function cekAktivasi() {
            if (document.getElementById("input-kode").value === KODE_AKTIVASI) {
                document.getElementById("activation-overlay").style.display = "none";
                document.getElementById("remote-content").style.display = "block";
                startAutoScan(); // 1. Cari IP Dulu
                initFirebase();  // 2. Siapkan Firebase Backup
            }
        }

        // --- FITUR AUTO SCAN IP AKURAT ---
        async function startAutoScan() {
            const scanInfo = document.getElementById("scan-info");
            const statusHeader = document.getElementById("target-status");
            
            // Mencoba rentang umum IP Hotspot/WiFi (192.168.1.x dan 192.168.43.x)
            const subnets = ["192.168.1", "192.168.43", "192.168.0", "192.168.8"];
            
            for (let sub of subnets) {
                scanInfo.innerText = `Scanning subnet ${sub}.x...`;
                for (let i = 1; i < 255; i++) {
                    const testIp = `${sub}.${i}`;
                    try {
                        // Timeout pendek agar scan cepat
                        const controller = new AbortController();
                        const id = setTimeout(() => controller.abort(), 50); 
                        
                        await fetch(`http://${testIp}:8080`, { mode: 'no-cors', signal: controller.signal });
                        
                        // Jika fetch tidak error, berarti server NanoHTTPD ditemukan!
                        ipTarget = testIp;
                        scanInfo.innerText = `IP DITEMUKAN: ${ipTarget}`;
                        statusHeader.innerText = "TARGET: ONLINE (LOCAL)";
                        statusHeader.className = "status-header online";
                        return; // Berhenti jika sudah ketemu
                    } catch (e) { continue; }
                }
            }
            scanInfo.innerText = "IP Lokal tidak ditemukan. Menggunakan Jalur Firebase.";
        }

        async function sendCommand(val) {
            const logicResult = (12 - val).toFixed(1);
            
            // JALUR 1: LOKAL (Jika IP Ketemu)
            if (ipTarget) {
                fetch(`http://${ipTarget}:8080?spin=${logicResult}`, { mode: 'no-cors' })
                .catch(() => { ipTarget = null; startAutoScan(); }); // Scan ulang jika putus
            }

            // JALUR 2: FIREBASE (Backup)
            if (firebaseDb) {
                firebase.database().goOnline();
                firebaseDb.update({ rotation: logicResult, last_click: Date.now() });
            }
            document.getElementById("btnVal").innerText = val;
        }

        function initFirebase() {
            const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
            firebase.initializeApp(config);
            firebaseDb = firebase.database().ref('control');
            
            // Monitor Online via Firebase jika Lokal gagal
            firebaseDb.child('keep_alive').on('value', (snap) => {
                if (!ipTarget) {
                    const isOnline = Date.now() - snap.val() < 40000;
                    document.getElementById("target-status").innerText = isOnline ? "TARGET: ONLINE (WEB)" : "TARGET: OFFLINE";
                    document.getElementById("target-status").className = isOnline ? "status-header online" : "status-header offline";
                }
            });

            // Generate tombol melingkar
            const clock = document.getElementById("clock");
            for (let i = 1; i <= 12; i++) {
                let btn = document.createElement("button");
                btn.className = "num-btn";
                btn.innerText = i;
                let angle = (i * 30 - 90) * (Math.PI / 180);
                btn.style.left = (150 + 115 * Math.cos(angle)) + "px";
                btn.style.top = (150 + 115 * Math.sin(angle)) + "px";
                btn.onclick = () => sendCommand(i);
                clock.appendChild(btn);
            }
        }

        function sendRandom() {
            if (ipTarget) fetch(`http://${ipTarget}:8080?spin=RANDOM`, { mode: 'no-cors' });
            if (firebaseDb) firebaseDb.update({ rotation: "RANDOM", last_click: Date.now() });
            document.getElementById("btnVal").innerText = "RND";
        }
    </script>
</body>
</html>
