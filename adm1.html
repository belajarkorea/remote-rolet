<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Client B</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #activation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #2c3e50; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; }
        .login-box input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; border: none; text-align: center; font-size: 18px; }
        .login-box button { width: 100%; padding: 12px; background: #e67e22; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        .wa-contact { margin-top: 20px; font-size: 13px; color: #aaa; }
        .wa-btn { display: inline-flex; align-items: center; background: #25d366; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 10px; font-size: 14px; }
        
        h2 { color: #e67e22; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 18px; }
        .clock-container { position: relative; width: 300px; height: 300px; margin: 0 auto; border: 8px solid #333; border-radius: 50%; background: radial-gradient(#2c3e50, #000); }
        .num-btn { position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid #d35400; background: #e67e22; color: white; font-weight: bold; transform: translate(-50%, -50%); cursor: pointer; }
        .rnd-btn { position: absolute; left: 150px; top: 150px; transform: translate(-50%, -50%); width: 80px; height: 80px; border-radius: 50%; border: 4px solid #27ae60; background: #2ecc71; color: white; font-weight: bold; z-index: 10; cursor: pointer; }
        
        #sync-status { font-size: 14px; color: #ffeb3b; font-weight: bold; margin-top: 20px; display: block; }
    </style>
</head>
<body>

    <div id="activation-overlay">
        <div class="login-box">
            <h3>KODE AKTIVASI</h3>
            <input type="password" id="input-kode" placeholder="••••">
            <button onclick="cekAktivasi()">MASUK</button>
            <div class="wa-contact"><a href="https://wa.me/628156678087" target="_blank" class="wa-btn">WhatsApp Admin</a></div>
        </div>
    </div>

    <div id="remote-content" style="display:none;">
        <h2>REMOTE CLIENT B</h2>
        <div class="clock-container" id="clock"><button class="rnd-btn" onclick="sendRandom()">RND</button></div>
        <span id="sync-status">STATUS: STANDBY</span>
    </div>

    <script>
        const KODE_AKTIVASI = "6677";
        setInterval(() => { location.reload(); }, 60000); // Auto-Refresh 1 menit

        function cekAktivasi() {
            if (document.getElementById("input-kode").value === KODE_AKTIVASI) {
                localStorage.setItem("isLoggedInB", "true"); // Key B
                tampilkanRemote();
            }
        }

        window.onload = function() {
            if (localStorage.getItem("isLoggedInB") === "true") tampilkanRemote();
        };

        function tampilkanRemote() {
            document.getElementById("activation-overlay").style.display = "none";
            document.getElementById("remote-content").style.display = "block";
            initFirebase();
        }

        function initFirebase() {
            const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            const db = firebase.database().ref('control');
            
            db.on('value', (snap) => {
                const data = snap.val();
                if (!data) return;

                // 1. Global Kill Switch
                if (data.app_status === "OFF") {
                    if (window.AndroidInterface && window.AndroidInterface.closeApp) window.AndroidInterface.closeApp();
                }

                // 2. Control Khusus Client B
                const statusB = data.clientB_status || "ON";
                const buttons = document.querySelectorAll('button');
                buttons.forEach(btn => {
                    btn.disabled = (statusB === "OFF");
                    btn.style.opacity = (statusB === "OFF") ? "0.5" : "1";
                    btn.style.cursor = (statusB === "OFF") ? "not-allowed" : "pointer";
                });
                
                if(statusB === "OFF") {
                    document.getElementById("sync-status").innerText = "REMOTE B NONAKTIF";
                } else {
                    document.getElementById("sync-status").innerText = "STATUS: STANDBY";
                }
            });

            const clock = document.getElementById("clock");
            for (let i = 1; i <= 12; i++) {
                let btn = document.createElement("button");
                btn.className = "num-btn";
                btn.innerText = i;
                let angle = (i * 30 - 90) * (Math.PI / 180);
                btn.style.left = (150 + 115 * Math.cos(angle)) + "px";
                btn.style.top = (150 + 115 * Math.sin(angle)) + "px";
                btn.onclick = () => db.update({ rotation: (12 - i).toFixed(1) });
                clock.appendChild(btn);
            }
        }

        function sendRandom() { firebase.database().ref('control').update({ rotation: "RANDOM" }); }
    </script>
</body>
</html>
