<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kontrol</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        h2 { color: #333; font-size: 18px; margin-bottom: 20px; }
        
        /* DESAIN SAKELAR */
        .switch { position: relative; display: inline-block; width: 100px; height: 50px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 50px; }
        .slider:before { position: absolute; content: ""; height: 42px; width: 42px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        
        input:checked + .slider { background-color: #4CAF50; }
        input:not(:checked) + .slider { background-color: #f44336; }
        input:checked + .slider:before { transform: translateX(50px); }

        .status-text { margin-top: 20px; font-weight: bold; font-size: 20px; }
        .on { color: #4CAF50; }
        .off { color: #f44336; }
        
        .info { font-size: 10px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>KONTROL SERVER</h2>
    
    <label class="switch">
        <input type="checkbox" id="toggleStatus" onclick="toggleServer()">
        <span class="slider"></span>
    </label>

    <div class="status-text" id="statusLabel">Memuat...</div>
    <div class="info">Status Terakhir: <span id="lastTime">-</span></div>
</div>

<script>
    // Konfigurasi Firebase kamu
    const config = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const dbRef = firebase.database().ref('control');

    const toggle = document.getElementById("toggleStatus");
    const label = document.getElementById("statusLabel");
    const timeLabel = document.getElementById("lastTime");

    // Ambil data status awal dari Firebase
    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            const currentStatus = data.clientA_status || "ON";
            if (currentStatus === "ON") {
                toggle.checked = true;
                label.innerText = "SISTEM ON";
                label.className = "status-text on";
            } else {
                toggle.checked = false;
                label.innerText = "SISTEM OFF";
                label.className = "status-text off";
            }
            
            // Tampilkan waktu update terakhir
            if (data.last_click) {
                const date = new Date(data.last_click);
                timeLabel.innerText = date.toLocaleTimeString();
            }
        }
    });

    // Fungsi untuk merubah status saat sakelar diklik
    function toggleServer() {
        const newStatus = toggle.checked ? "ON" : "OFF";
        
        dbRef.update({
            clientA_status: newStatus,
            last_click: Date.now()
        }).then(() => {
            console.log("Status berhasil diubah ke: " + newStatus);
        }).catch((error) => {
            alert("Gagal merubah status: " + error.message);
        });
    }
</script>

</body>
</html>
