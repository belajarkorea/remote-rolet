<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clock Remote Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; touch-action: manipulation; }

        h2 { color: #f59e0b; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }

        /* STATUS BAR */
        .status-bar { display: flex; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 30px; }
        .status-box { flex: 1; background: #1e293b; padding: 10px; border-radius: 8px; text-align: center; font-size: 10px; border: 1px solid #334155; }
        .status-box span { display: block; font-weight: bold; margin-top: 4px; font-size: 12px; }
        .green { color: #22c55e; }
        .yellow { color: #f59e0b; }

        /* JAM LAYOUT */
        .clock-container { position: relative; width: 280px; height: 280px; background: #1e293b; border-radius: 50%; border: 8px solid #334155; box-shadow: 0 0 30px rgba(0,0,0,0.5); margin-bottom: 40px; }
        
        .btn-circle { 
            position: absolute; 
            width: 45px; 
            height: 45px; 
            background: #f59e0b; 
            color: #0f172a; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            cursor: pointer; 
            border: none;
            box-shadow: 0 4px 0 #b45309;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-circle:active { transform: scale(0.9); box-shadow: 0 0 0; background: #fbbf24; }

        /* TOMBOL RND (TENGAH) */
        .btn-rnd { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 70px; height: 70px; 
            background: #22c55e; 
            color: white; 
            font-size: 14px;
            box-shadow: 0 4px 0 #15803d;
        }
        .btn-rnd:active { transform: translate(-50%, -45%) scale(0.9); }

        /* INFO BOX */
        .info-card { background: #1e293b; width: 100%; max-width: 350px; padding: 15px; border-radius: 12px; border-left: 4px solid #f59e0b; font-size: 12px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; color: #94a3b8; }
        .info-val { color: #f8fafc; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

    <h2>Clock Remote Pro</h2>

    <div class="status-bar">
        <div class="status-box">SYNC<span>DIRECT</span></div>
        <div class="status-box">SYSTEM<span id="sys-stat" class="green">READY</span></div>
        <div class="status-box">MODE<span>TELEGRAM</span></div>
    </div>

    <div class="clock-container" id="clock-plate">
        <button class="btn-circle btn-rnd" onclick="sendCmd(null, 'RANDOM')">RND</button>
    </div>

    <div class="info-card">
        <div class="info-row">Command: <span class="info-val" id="log-cmd">-</span></div>
        <div class="info-row">Value: <span class="info-val" id="log-val">-</span></div>
        <div class="info-row">Status: <span class="info-val" id="log-status">IDLE</span></div>
    </div>

    <script>
        const BOT_TOKEN = "8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28";
        const CHAT_ID = "1988855705";

        // Generate Posisi Tombol Jam (1-12)
        const plate = document.getElementById('clock-plate');
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-circle';
            btn.innerText = i;
            
            // Rumus Matematika posisi lingkaran
            const angle = (i * 30 - 90) * (Math.PI / 180);
            const radius = 105; 
            const x = 140 + radius * Math.cos(angle) - 22.5;
            const y = 140 + radius * Math.sin(angle) - 22.5;
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.onclick = () => sendCmd(i, i.toString());
            plate.appendChild(btn);
        }

        function sendCmd(id, label) {
            let val;
            
            if (label === 'RANDOM') {
                // WEB mengacak angka 0.0 - 11.0
                val = (Math.floor(Math.random() * 12)).toFixed(1);
            } else {
                // Konversi angka jam ke rotasi rolet (12-id)
                val = (12 - id).toFixed(1);
            }

            // Update UI
            document.getElementById("log-cmd").innerText = "BTN_" + label;
            document.getElementById("log-val").innerText = val;
            document.getElementById("log-status").innerText = "SENDING...";
            document.getElementById("sys-stat").innerText = "BUSY";
            document.getElementById("sys-stat").className = "yellow";

            // KIRIM LANGSUNG KE TELEGRAM (Tanpa Firebase)
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${val}`;
            
            fetch(url)
            .then(res => {
                if(res.ok) {
                    document.getElementById("log-status").innerText = "SUCCESS";
                    document.getElementById("sys-stat").innerText = "READY";
                    document.getElementById("sys-stat").className = "green";
                }
            })
            .catch(err => {
                document.getElementById("log-status").innerText = "FAILED";
                document.getElementById("sys-stat").innerText = "ERROR";
                document.getElementById("sys-stat").className = "red";
            });
        }

        // Auto Refresh visual setiap 10 detik
        setInterval(() => {
            if(document.getElementById("log-status").innerText !== "SENDING...") {
                document.getElementById("log-status").innerText = "IDLE";
            }
        }, 10000);
    </script>
</body>
</html>
