<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Penerima Core Pro - Dual Path</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background: #000; color: #0f0; font-family: monospace; font-size: 10px;">
    <div id="status">INITIALIZING...</div>
    <div id="last_val">VALUE: -</div>

    <script>
        // 1. KONFIGURASI FIREBASE
        const firebaseConfig = { 
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        // TOKEN TELEGRAM KAMU
        const TG_TOKEN = "8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28";
        window.lastStoredMsg = "";

        // 2. MONITOR KONEKSI (SELF-HEALING)
        const connectedRef = firebase.database().ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                updateUI("CONNECTED", "#0f0");
            } else {
                updateUI("DISCONNECTED! RECONNECTING...", "#f00");
                firebase.database().goOnline();
            }
        });

        // 3. JALUR FIREBASE: PENGAMBIL DATA REALTIME
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.rotation !== undefined) {
                let val = data.rotation.toString();
                
                // Jika perintah RANDOM atau data rusak (NaN), buat random seketika
                if (val === "RANDOM" || val === "NaN") {
                    val = (Math.floor(Math.random() * 12)).toFixed(1);
                }

                document.getElementById("last_val").innerText = "FB VALUE: " + val;

                // KIRIM KE ANDROID
                if (window.AndroidInterface && window.AndroidInterface.postMessage) {
                    window.AndroidInterface.postMessage(val);
                }
            }
        }, (error) => {
            updateUI("DATABASE ERROR: " + error.message, "#f00");
        });

        // 4. JALUR TELEGRAM: POLLING DATA
        async function checkTelegram() {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=-1`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.result && data.result.length > 0) {
                    let lastMsg = data.result[0].message.text;
                    
                    if (lastMsg !== window.lastStoredMsg) {
                        window.lastStoredMsg = lastMsg;
                        
                        // Validasi jika bukan angka, paksa random
                        if (isNaN(parseFloat(lastMsg))) {
                            lastMsg = (Math.floor(Math.random() * 12)).toFixed(1);
                        }

                        document.getElementById("last_val").innerText = "TG VALUE: " + lastMsg;
                        if (window.AndroidInterface) window.AndroidInterface.postMessage(lastMsg);
                    }
                }
            } catch (e) { console.log("TG Error"); }
        }
        setInterval(checkTelegram, 1500);

        // 5. MAINTENANCE & ANTI-SLEEP (Interval 25 detik agar tidak spam)
        setInterval(() => {
            db.update({ 
                keep_alive: Date.now(),
                client_status: "ACTIVE" 
            });
        }, 25000);

        // 6. AUTO-RELOAD (FAILURE PROTECTION)
        let timeout = setTimeout(() => location.reload(), 300000); // 5 menit
        db.on('value', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => location.reload(), 300000);
        });

        function updateUI(msg, color) {
            const el = document.getElementById("status");
            el.innerText = msg;
            el.style.color = color;
        }
    </script>
</body>
</html>
