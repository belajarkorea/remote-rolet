<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <script>
        const firebaseConfig = { databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        // Gunakan .once agar hanya membaca satu kali saat dipicu tombol Spin
        db.once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data && data.rotation !== undefined) {
                let val = data.rotation.toString();
                
                // Jika isinya RANDOM, acak dulu di sini
                if (val === "RANDOM") {
                    val = (Math.floor(Math.random() * 12)).toFixed(1);
                }

                if (window.AndroidInterface) {
                    window.AndroidInterface.postMessage(val);
                }
            }
        });
    </script>
</body>
</html>
