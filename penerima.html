<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <script>
        const firebaseConfig = {
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        // Fungsi Pendengar Utama
        function startListening() {
            db.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.rotation !== undefined) {
                    const val = data.rotation.toString();
                    
                    if (val === "RANDOM") {
                        generateRandom();
                    } else {
                        sendToApp(val);
                    }
                }
            }, (error) => {
                // Jika koneksi internet drop, coba sambungkan lagi otomatis
                setTimeout(startListening, 3000);
            });
        }

        function generateRandom() {
            const rand = (Math.floor(Math.random() * 12)).toFixed(1);
            sendToApp(rand);
        }

        function sendToApp(value) {
            if (window.AndroidInterface) {
                window.AndroidInterface.postMessage(value);
            }
        }

        // Jalankan pendengar pertama kali
        startListening();

        // JANTUNG BUATAN (KEEP ALIVE)
        // Setiap 60 detik, kirim data "ping" ke Firebase agar koneksi tidak dianggap idle/mati
        setInterval(() => {
            db.update({ ping: Date.now() });
            console.log("Koneksi tetap terjaga...");
        }, 10000); 
    </script>
</body>
</html>
