<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <script>
        // 1. Konfigurasi Database kamu
        const firebaseConfig = {
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        
        // 2. Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        // 3. Pantau perubahan data secara Real-time (Zero Delay)
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.rotation) {
                // Mengirim angka ke fungsi Smali di APK Rolet
                if (window.AndroidInterface) {
                    window.AndroidInterface.postMessage(data.rotation);
                }
            }
        });
    </script>
</body>
</html>
