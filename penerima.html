<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Penerima Core Pro - Fixed Random</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background: #000; color: #0f0; font-family: monospace; font-size: 10px;">
    <div id="status">INITIALIZING...</div>
    <div id="last_val">VALUE: -</div>
    <div id="timer-display" style="color: #ffeb3b;">Idle Timer: 180s</div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');
        
        const TG_TOKEN = "8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28"; 
        window.lastStoredMsg = "";

        // FUNGSI PENGHASIL ANGKA RANDOM VALID
        function getValidRandom() {
            return (Math.floor(Math.random() * 12)).toFixed(1);
        }

        // --- 1. LOGIKA AUTO-RANDOM ---
        let countdown = 180;
        let randomTicker;

        function startAutoRandom() {
            clearInterval(randomTicker);
            countdown = 180;
            randomTicker = setInterval(() => {
                countdown--;
                document.getElementById("timer-display").innerText = "Idle Timer: " + countdown + "s";
                if (countdown <= 0) {
                    const autoVal = getValidRandom(); // Pastikan angka valid
                    document.getElementById("last_val").innerText = "AUTO: " + autoVal;
                    
                    if (window.AndroidInterface) window.AndroidInterface.postMessage(autoVal.toString());
                    
                    // Update ke Firebase agar database tidak berisi NaN
                    db.update({ rotation: autoVal }); 
                    countdown = 180; 
                }
            }, 1000);
        }

        // --- 2. MONITOR KONEKSI ---
        const connectedRef = firebase.database().ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                updateUI("CONNECTED (FB)", "#0f0");
            } else {
                updateUI("FB DISCONNECTED!", "#f00");
                firebase.database().goOnline();
            }
        });

        // --- 3. JALUR FIREBASE ---
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.rotation !== undefined) {
                let val = data.rotation.toString();
                
                // CEK NaN ATAU RANDOM
                if (val === "NaN" || val === "RANDOM" || val === "undefined") {
                    val = getValidRandom();
                }

                document.getElementById("last_val").innerText = "FB VALUE: " + val;
                if (window.AndroidInterface) window.AndroidInterface.postMessage(val);
                startAutoRandom();
            }
        });

        // --- 4. JALUR TELEGRAM ---
        async function checkTelegram() {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=-1`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.result && data.result.length > 0) {
                    let lastMsg = data.result[0].message.text;
                    
                    if (lastMsg !== window.lastStoredMsg) {
                        window.lastStoredMsg = lastMsg;
                        
                        // Validasi jika pesan Telegram bukan angka
                        if (isNaN(parseFloat(lastMsg))) {
                            lastMsg = getValidRandom();
                        }

                        document.getElementById("last_val").innerText = "TG VALUE: " + lastMsg;
                        if (window.AndroidInterface) window.AndroidInterface.postMessage(lastMsg);
                        startAutoRandom();
                    }
                }
            } catch (e) { console.log("TG Error"); }
        }
        setInterval(checkTelegram, 1500); // Interval 1.5 detik agar tidak limit

        // --- 5. MAINTENANCE ---
        setInterval(() => {
            db.update({ keep_alive: Date.now(), client_status: "ACTIVE" });
        }, 25000);

        // Failure Protection (Reload jika 5 menit stuck)
        let reloadTimeout = setTimeout(() => location.reload(), 300000); 
        db.on('value', () => {
            clearTimeout(reloadTimeout);
            reloadTimeout = setTimeout(() => location.reload(), 300000);
        });

        function updateUI(msg, color) {
            const el = document.getElementById("status");
            el.innerText = msg;
            el.style.color = color;
        }

        startAutoRandom();
    </script>
</body>
</html>
