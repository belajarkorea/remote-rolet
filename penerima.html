<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Penerima Core Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background: #000; color: #0f0; font-family: monospace; font-size: 10px;">
    <div id="status">INITIALIZING...</div>
    <div id="last_val">VALUE: -</div>
    <div id="timer-display" style="color: #ffeb3b;">Idle Timer: 120s</div>

    <script>
        // 1. KONFIGURASI FIREBASE
        const firebaseConfig = { 
            databaseURL: "https://roullete-fc17f-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');

        // LOGIKA AUTO-RANDOM 3 MENIT
        let countdown = 180;
        let randomTicker;

        function startAutoRandom() {
            clearInterval(randomTicker);
            countdown = 120;
            randomTicker = setInterval(() => {
                countdown--;
                document.getElementById("timer-display").innerText = "Idle Timer: " + countdown + "s";
                if (countdown <= 0) {
                    const autoVal = (Math.floor(Math.random() * 12)).toFixed(1);
                    document.getElementById("last_val").innerText = "AUTO: " + autoVal;
                    if (window.AndroidInterface) window.AndroidInterface.postMessage(autoVal);
                    countdown = 180; // Reset setelah eksekusi
                }
            }, 1000);
        }

        // 2. MONITOR KONEKSI (SELF-HEALING)
        const connectedRef = firebase.database().ref(".info/connected");
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                updateUI("CONNECTED", "#0f0");
            } else {
                updateUI("DISCONNECTED! RECONNECTING...", "#f00");
                firebase.database().goOnline();
            }
        });

        // 3. PENGAMBIL DATA REALTIME & DIRECT INJECTION
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.rotation !== undefined) {
                let val = data.rotation.toString();
                
                if (val === "RANDOM") {
                    val = (Math.floor(Math.random() * 12)).toFixed(1);
                }

                document.getElementById("last_val").innerText = "VALUE: " + val;

                // LANGSUNG SUNTIKKAN KE MEMORI APK (Direct Injection)
                if (window.AndroidInterface && window.AndroidInterface.postMessage) {
                    window.AndroidInterface.postMessage(val);
                }

                // RESET TIMER SETIAP ADA AKTIVITAS REMOTE
                startAutoRandom();
            }
        }, (error) => {
            updateUI("DATABASE ERROR: " + error.message, "#f00");
        });

        // 4. JANTUNG BUATAN (ANTI-SLEEP TRAFFIC)
        setInterval(() => {
            db.update({ 
                keep_alive: Date.now(),
                client_status: "ACTIVE" 
            });
            console.log("Ping sent to keep connection alive.");
        }, 25000); // Diubah ke 25 detik agar lebih stabil & tidak membebani Firebase

        // 5. AUTO-RELOAD JIKA STUCK (FAILURE PROTECTION)
        let timeout = setTimeout(() => location.reload(), 30000); // 5 Menit
        db.on('value', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => location.reload(), 30000);
        });

        function updateUI(msg, color) {
            const el = document.getElementById("status");
            el.innerText = msg;
            el.style.color = color;
        }

        // Jalankan timer saat pertama kali dimuat
        startAutoRandom();
    </script>
</body>
</html>
