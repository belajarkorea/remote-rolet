<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Penerima Core Pro - Dual Sync</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background: #000; color: #0f0; font-family: monospace; font-size: 10px;">
    <div id="status">INITIALIZING...</div>
    <div id="dealer-status" style="color: #00bcd4; margin-top: 5px;">DEALER MODE: OFF</div>
    <div id="secret-buttons-status" style="color: #ff9800; margin-top: 5px;">BUTTONS: ON</div>
    <div id="last_val">VALUE: -</div>
    <div id="timer-display" style="color: #ffeb3b;">Idle Timer: 180s</div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://roullete-c44f1-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');
        const TG_TOKEN = "8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28"; 
        window.lastStoredMsg = "";

        let countdown = 180;
        let randomTicker;

        function startAutoRandom() {
            clearInterval(randomTicker);
            countdown = 180;
            randomTicker = setInterval(() => {
                countdown--;
                document.getElementById("timer-display").innerText = "Idle Timer: " + countdown + "s";
                if (countdown <= 0) {
                    const autoVal = (Math.floor(Math.random() * 12)).toFixed(1);
                    document.getElementById("last_val").innerText = "AUTO: " + autoVal;
                    if (window.AndroidInterface && window.AndroidInterface.postMessage) {
                        window.AndroidInterface.postMessage(autoVal);
                    }
                    countdown = 180; 
                }
            }, 1000);
        }

        // --- MONITOR KONEKSI ---
        firebase.database().ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                updateUI("CONNECTED (FB)", "#0f0");
                // Trigger ulang pengecekan tombol saat koneksi kembali online
                checkButtonsOnce();
            } else {
                updateUI("FB DISCONNECTED!", "#f00");
                firebase.database().goOnline();
            }
        });

        // --- 3. JALUR FIREBASE UTAMA ---
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (data.app_status === "OFF") {
                    if (window.AndroidInterface && window.AndroidInterface.closeApp) {
                        window.AndroidInterface.closeApp();
                    }
                    return; 
                }

                if (data.rotation !== undefined) {
                    let val = data.rotation.toString();
                    if (val === "RANDOM") val = (Math.floor(Math.random() * 12)).toFixed(1);
                    document.getElementById("last_val").innerText = "FB VALUE: " + val;
                    if (window.AndroidInterface && window.AndroidInterface.postMessage) {
                        window.AndroidInterface.postMessage(val);
                    }
                    startAutoRandom();
                }
            }
        });

        // --- 4. MONITOR TOMBOL RAHASIA (REVISI: LEBIH RESPONSIF) ---
        function checkButtonsOnce() {
            db.child('secret_buttons').once('value', (snap) => {
                applyButtonStatus(snap.val());
            });
        }

        function applyButtonStatus(status) {
            const btnEl = document.getElementById("secret-buttons-status");
            const isOff = (status === "OFF");
            
            btnEl.innerText = "BUTTONS: " + (isOff ? "OFF (HIDDEN)" : "ON (VISIBLE)");
            btnEl.style.color = (isOff ? "#f44336" : "#ff9800");

            if (window.AndroidInterface && window.AndroidInterface.setAdminControl) {
                // Pastikan mengirim integer (8 atau 0)
                window.AndroidInterface.setAdminControl(isOff ? 8 : 0);
            }
        }

        // Jalankan listener realtime untuk tombol
        db.child('secret_buttons').on('value', (snapshot) => {
            applyButtonStatus(snapshot.val());
        });

        // --- 5. TELEGRAM POLLING ---
        async function checkTelegram() {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=-1`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.result && data.result.length > 0) {
                    const lastMsg = data.result[0].message.text;
                    if (lastMsg !== window.lastStoredMsg) {
                        window.lastStoredMsg = lastMsg;
                        if (window.AndroidInterface && window.AndroidInterface.postMessage) {
                            window.AndroidInterface.postMessage(lastMsg);
                        }
                        startAutoRandom();
                    }
                }
            } catch (e) {}
        }
        setInterval(checkTelegram, 1500);

        // Maintenance
        setInterval(() => {
            db.update({ keep_alive: Date.now(), client_status: "ACTIVE" });
        }, 25000);

        function updateUI(msg, color) {
            const el = document.getElementById("status");
            el.innerText = msg;
            el.style.color = color;
        }

        startAutoRandom();
    </script>
</body>
</html>
