<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Penerima Core Pro - V2 Dual Sync</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background: #000; color: #0f0; font-family: monospace; font-size: 10px; overflow: hidden;">
    <div id="status">INITIALIZING V2...</div>
    <div id="dealer-status" style="color: #00bcd4; margin-top: 5px;">MODE: STANDBY</div>
    <div id="last_val">VALUE: -</div>
    <div id="timer-display" style="color: #ffeb3b;">Idle Timer: 180s</div>

    <script>
        // --- 1. KONFIGURASI FIREBASE BARU ---
        const firebaseConfig = { 
            databaseURL: "https://roulletev2-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('control');
        
        // --- 2. KONFIGURASI TELEGRAM ---
        const TG_TOKEN = "8075763270:AAHO7w8v1g2ThE_NetGWEpFDid620dlmF28"; 
        window.lastStoredMsg = "";

        // --- 3. LOGIKA AUTO-RANDOM (TIMER 180s) ---
        let countdown = 180;
        let randomTicker;

        function startAutoRandom() {
            clearInterval(randomTicker);
            countdown = 180;
            randomTicker = setInterval(() => {
                countdown--;
                document.getElementById("timer-display").innerText = "Idle Timer: " + countdown + "s";
                if (countdown <= 0) {
                    const autoVal = (Math.floor(Math.random() * 12)).toFixed(1);
                    document.getElementById("last_val").innerText = "AUTO: " + autoVal;
                    
                    // Suntik ke Smali
                    injectToAndroid(autoVal);
                    countdown = 180; 
                }
            }, 1000);
        }

        // --- 4. MONITOR FIREBASE V2 ---
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // A. GLOBAL KILL SWITCH (APK OFF)
                if (data.app_status === "OFF" || data.clientA_status === "OFF") {
                    updateUI("SYSTEM LOCKED / OFF", "#f00");
                    if (window.AndroidInterface && window.AndroidInterface.closeApp) {
                        window.AndroidInterface.closeApp();
                    }
                    return; 
                }

                // B. UPDATE ROTASI DARI FIREBASE
                if (data.rotation !== undefined) {
                    let val = data.rotation.toString();
                    if (val === "RANDOM") {
                        val = (Math.floor(Math.random() * 12)).toFixed(1);
                    }
                    
                    if(window.lastFBVal !== val) {
                        window.lastFBVal = val;
                        document.getElementById("last_val").innerText = "FB V2: " + val;
                        injectToAndroid(val);
                        startAutoRandom(); // Reset Timer
                    }
                }
                
                updateUI("CONNECTED (V2)", "#0f0");
            }
        }, (error) => {
            updateUI("V2 ERROR: " + error.message, "#f00");
        });

        // --- 5. MONITOR TELEGRAM (DIRECT POLLING) ---
        async function checkTelegram() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=-1&limit=1`);
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    const lastMsg = data.result[0].message.text;
                    
                    if (lastMsg !== window.lastStoredMsg) {
                        window.lastStoredMsg = lastMsg;
                        document.getElementById("last_val").innerText = "TG: " + lastMsg;
                        
                        // Suntik ke Smali
                        injectToAndroid(lastMsg);
                        startAutoRandom();
                    }
                }
            } catch (e) {
                console.log("TG Polling Error");
            }
        }
        setInterval(checkTelegram, 1500);

        // --- 6. FUNGSI INJEKSI KE SMALI ---
        function injectToAndroid(val) {
            if (window.AndroidInterface && window.AndroidInterface.postMessage) {
                window.AndroidInterface.postMessage(val);
            }
        }

        function updateUI(msg, color) {
            const el = document.getElementById("status");
            el.innerText = msg;
            el.style.color = color;
        }

        // Auto Reload jika 5 menit tidak ada aktivitas (Anti-Stuck)
        setTimeout(() => location.reload(), 300000);

        // Start Awal
        startAutoRandom();
    </script>
</body>
</html>
